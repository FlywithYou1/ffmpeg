          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "（无）"
          echo "--- VAAPI ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_vaapi' | head -10 || echo "（无）"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-intel-qsv.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-intel-qsv
          path: ffmpeg-linux-intel-qsv.tar.xz
          retention-days: 30

