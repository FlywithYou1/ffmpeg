            cmake git wget curl ca-certificates python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libva-dev libvpl-dev libdrm-dev

      - name: Build VMAF (CPU)
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" --libdir=lib -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$P" --pkg-config-flags="--static" \
            --extra-cflags="-I$P/include" \
            --extra-ldflags="-L$P/lib" \
            --extra-libs="-lpthread -lm -ldl" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libvpl --enable-vaapi \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Strip & verify
        run: |
          strip "${HOME}/ffmpeg-install/bin/ffmpeg" "${HOME}/ffmpeg-install/bin/ffprobe" "${HOME}/ffmpeg-install/bin/ffplay" 2>/dev/null || true
          "${HOME}/ffmpeg-install/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "(none)"
          echo "--- VAAPI ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_vaapi' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-intel-qsv.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-intel-qsv
          path: ffmpeg-linux-intel-qsv.tar.xz
          retention-days: 30

