name: FFmpeg 多厂商构建

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天 0:00 = UTC 前一天 16:00
    - cron: '0 16 * * *'
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - '.github/workflows/build-ffmpeg.yml'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 构建元数据（决定 Release 标签与类型）
  # ============================================================
  metadata:
    name: 构建元数据
    runs-on: ubuntu-26.04
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      should_release: ${{ steps.vars.outputs.should_release }}
    steps:
      - name: 确定 Release 参数
        id: vars
        run: |
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            TAG="nightly-$(date -u +%Y-%m-%d-%H%M%S)"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="prerelease-$(date -u +%Y-%m-%d-%H%M%S)"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      # 定时触发时，先更新 vcpkg 依赖版本，再构建
      - name: 更新 vcpkg baseline
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CURRENT=$(grep -oP '"builtin-baseline"\s*:\s*"\K[^"]+' vcpkg.json || echo "none")
          LATEST=$(git ls-remote https://github.com/microsoft/vcpkg.git HEAD | cut -f1)

          if [ "$CURRENT" != "$LATEST" ] && [ -n "$LATEST" ]; then
            sed -i "s/\"builtin-baseline\": \"[^\"]*\"/\"builtin-baseline\": \"$LATEST\"/" vcpkg.json
            git add vcpkg.json
            git commit -m "chore(vcpkg): bump baseline to $LATEST"
            git push
            echo "vcpkg updated: $CURRENT -> $LATEST"
          else
            echo "vcpkg already up to date: $CURRENT"
          fi

  # ============================================================
  # LINUX — Matrix（NVIDIA / Intel QSV / AMD VAAPI / x86 整合 / ARM64）
  # ============================================================
  linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: nvidia
            name: Linux（NVIDIA NVENC/CUDA）
            runner: ubuntu-26.04
            extra_packages: libva-dev libvpl-dev libdrm-dev
            cuda: true
            vmaf_cuda: true
            configure_extra: --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc --enable-cuvid --enable-nvenc
            verify_grep: "grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc'"
            artifact: ffmpeg-linux-nvidia.tar.xz
          - id: intel-qsv
            name: Linux（Intel QSV）
            runner: ubuntu-26.04
            extra_packages: libva-dev libvpl-dev libdrm-dev
            cuda: false
            vmaf_cuda: false
            configure_extra: --enable-libvmaf --enable-libvpl --enable-vaapi
            verify_grep: "grep '_qsv' | head -10"
            artifact: ffmpeg-linux-intel-qsv.tar.xz
          - id: amd
            name: Linux（AMD VAAPI）
            runner: ubuntu-26.04
            extra_packages: libva-dev libdrm-dev
            cuda: false
            vmaf_cuda: false
            configure_extra: --enable-libvmaf --enable-vaapi
            verify_grep: "grep '_vaapi' | head -10"
            artifact: ffmpeg-linux-amd.tar.xz
          - id: x86-all
            name: "Linux x86 整合版（NVIDIA + Intel QSV + AMD VAAPI）"
            runner: ubuntu-26.04
            extra_packages: libva-dev libvpl-dev libdrm-dev
            cuda: true
            vmaf_cuda: true
            configure_extra: --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc --enable-cuvid --enable-nvenc --enable-vaapi --enable-libvpl
            verify_grep: "grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc|_qsv|_vaapi' | head -10"
            artifact: ffmpeg-linux-x86-all.tar.xz
          - id: arm
            name: Linux（ARM64 VAAPI）
            runner: ubuntu-26.04-arm
            extra_packages: libva-dev libdrm-dev
            cuda: false
            vmaf_cuda: false
            configure_extra: --enable-libvmaf --enable-vaapi
            verify_grep: "grep '_vaapi' | head -10"
            artifact: ffmpeg-linux-arm.tar.xz
    steps:
      - uses: actions/checkout@v7

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates gnupg python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            ${{ matrix.extra_packages }} \
            libx264-dev libx265-dev libvpx-dev libopus-dev libvorbis-dev \
            libtheora-dev libaom-dev libwebp-dev libass-dev libfreetype6-dev \
            libfontconfig1-dev libzimg-dev libsoxr-dev libopenjp2-7-dev \
            libsnappy-dev libvulkan-dev opencl-headers ocl-icd-opencl-dev glslc \
            libsvtav1enc-dev libdav1d-dev libkvazaar-dev libcrypto++-dev libopenh264-dev libxvidcore-dev \
            libtwolame-dev libspeex-dev libcodec2-dev libjxl-dev libopenmpt-dev \
            liblcms2-dev libxxhash-dev libbs2b-dev libaribb24-dev libplacebo-dev glslang-dev spirv-tools librubberband-dev libvidstab-dev
            sudo apt-get upgrade -y -qq
            bash scripts/ci/linux-pc-fallbacks.sh /usr

      - name: 安装 CUDA 工具包
        if: matrix.cuda
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-toolkit-13-3
          sudo apt-get update -qq
          sudo apt-get upgrade -y -qq
          CUDA_VER_DIR=$(ls -d /usr/local/cuda-13.* 2>/dev/null | sort -V | tail -1)
          if [ -n "${CUDA_VER_DIR}" ]; then
            sudo ln -sf "${CUDA_VER_DIR}" /usr/local/cuda 2>/dev/null || true
            echo "CUDA linked: ${CUDA_VER_DIR}"
          else
            sudo ln -sf /usr/local/cuda-13.3 /usr/local/cuda 2>/dev/null || true
          fi

      - name: 检测 CUDA
        if: matrix.cuda
        run: |
          CUDA_BASE=""
          for d in /usr/local/cuda-* /usr/local/cuda; do
            if [ -d "$d/bin" ] && [ -x "$d/bin/nvcc" ]; then CUDA_BASE="$d"; break; fi
          done
          [ -z "${CUDA_BASE}" ] && { echo "::error::未找到 CUDA"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc" --version

      - name: 编译 nv-codec-headers
        if: matrix.cuda
        run: |
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX=/usr/local
          sudo make PREFIX=/usr/local install

      - name: 编译 VMAF
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          if [ "${{ matrix.vmaf_cuda }}" = "true" ]; then
            export CUDA_PATH="${CUDA_HOME}" CUDACXX="${CUDA_HOME}/bin/nvcc"
            export PATH="${CUDA_HOME}/bin:${PATH}"
            export C_INCLUDE_PATH="${CUDA_HOME}/include:${C_INCLUDE_PATH:-}"
            meson setup build --buildtype release --prefix="$P" --libdir=lib \
              -Denable_cuda=true -Dc_link_args="-lstdc++" -Dcpp_link_args="-lstdc++"
          else
            PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" --libdir=lib -Denable_cuda=false
          fi
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: 编译 FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          bash scripts/ci/linux-pc-fallbacks.sh "$P"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          if [ "${{ matrix.cuda }}" = "true" ]; then
            export PATH="${CUDA_HOME}/bin:${PATH}"
          fi
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          # Ubuntu 26.04 的 libopenjp2-7 将 opj_version 标记为 hidden symbol
          sed -i '/libopenjpeg/s/opj_version/opj_set_default_encoder_parameters/' configure
          ./configure --prefix="$P" --pkg-config-flags="--static" \
            --extra-cflags="-I$P/include" \
            --extra-ldflags="-L$P/lib -Wl,-rpath,$P/lib" \
            --extra-libs="-lpthread -lm -ldl" \
            --enable-gpl --enable-version3 --enable-nonfree \
            ${{ matrix.configure_extra }} --enable-opencl --enable-vulkan \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libsvtav1 --enable-libdav1d --enable-libkvazaar --enable-libopenh264 --enable-libxvid --enable-libtwolame --enable-libspeex --enable-libcodec2 --enable-libjxl --enable-libopenmpt --enable-libbs2b --enable-libaribb24 --enable-libplacebo --enable-librubberband --enable-libvidstab --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --enable-doc
          make -j"$(nproc)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        run: |
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"

      - name: 裁剪与验证
        run: |
          export LD_LIBRARY_PATH="${HOME}/ffmpeg-install/lib:${LD_LIBRARY_PATH:-}"
          strip "${HOME}/ffmpeg-install/bin/ffmpeg" "${HOME}/ffmpeg-install/bin/ffprobe" "${HOME}/ffmpeg-install/bin/ffplay" 2>/dev/null || true
          "${HOME}/ffmpeg-install/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- HW Accel ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | ${{ matrix.verify_grep }} || echo "（无）"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          [ -d "${HOME}/ffmpeg-install/share/doc/ffmpeg" ] && cp -r "${HOME}/ffmpeg-install/share/doc/ffmpeg" dist/doc || true
          cd dist && tar -cJf ../${{ matrix.artifact }} .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  # ============================================================
  # LINUX — NVIDIA（NVENC/CUDA + VMAF-CUDA）
  # ============================================================
  # ============================================================
  # WINDOWS — Matrix（NVIDIA / AMD AMF / Intel QSV / ARM64 / x86 整合）
  # ============================================================
  windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    env:
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: nvidia
            name: Windows（NVIDIA NVENC/CUDA）
            runner: windows-2025-vs2026
            msvc_arch: amd64
            triplet: x64-windows-static
            cuda: true
            amf: false
            vpl: false
            configure_extra: --enable-libvmaf --enable-libsvtav1 --enable-ffnvcodec --enable-cuda-nvcc --enable-cuvid --enable-nvenc
            artifact: ffmpeg-windows-nvidia.zip
          - id: amd-amf
            name: Windows（AMD AMF）
            runner: windows-2025-vs2026
            msvc_arch: amd64
            triplet: x64-windows-static
            cuda: false
            amf: true
            vpl: false
            configure_extra: --enable-libvmaf --enable-libsvtav1 --enable-amf
            artifact: ffmpeg-windows-amd-amf.zip
          - id: intel-qsv
            name: Windows（Intel QSV）
            runner: windows-2025-vs2026
            msvc_arch: amd64
            triplet: x64-windows-static
            cuda: false
            amf: false
            vpl: true
            configure_extra: --enable-libvmaf --enable-libsvtav1 --enable-libvpl
            artifact: ffmpeg-windows-intel-qsv.zip
          - id: arm64
            name: Windows ARM64（Snapdragon）
            runner: windows-11-vs2026-arm
            msvc_arch: amd64_arm64
            triplet: arm64-windows-static
            cuda: false
            amf: false
            vpl: false
            configure_extra: --enable-libvmaf --disable-libsvtav1
            artifact: ffmpeg-windows-arm64.zip
          - id: x86-all
            name: "Windows x86 整合版（NVIDIA + Intel QSV + AMD AMF）"
            runner: windows-2025-vs2026
            msvc_arch: amd64
            triplet: x64-windows-static
            cuda: true
            amf: true
            vpl: true
            configure_extra: --enable-libvmaf --enable-libsvtav1 --enable-ffnvcodec --enable-cuda-nvcc --enable-cuvid --enable-nvenc --enable-amf --enable-libvpl
            artifact: ffmpeg-windows-x86-all.zip
    steps:
      - uses: actions/checkout@v7

      - name: 配置 MSVC（VS 2026）
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.msvc_arch }}
          vsversion: "18.0"

      - name: 安装构建工具
        shell: pwsh
        run: |
          choco install -y --no-progress nasm make ninja
          pip install meson
          refreshenv
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) { echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append; Write-Host "nasm: $nasmDir" }
          if (-not $nasmDir) { Write-Host "::warning::nasm.exe not found" }
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          $clangDirUnix = $clangDir -replace '\\','/'
          if ($clangDir) { Write-Host "VS Clang: $clangDir" }
          if ($clangDir) { echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append }
          if ($clangDirUnix) { echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append }
          if (-not $clangDir) { Write-Host "::warning::VS Clang not found" }

      - name: 配置 vcpkg NuGet 缓存
        shell: pwsh
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          if (-not $env:GH_PACKAGES_TOKEN) { Write-Host "GH_PACKAGES_TOKEN not set, skipping NuGet binary cache"; exit 0 }
          $vcpkgExe = "$v\vcpkg.exe"
          $nuget = & $vcpkgExe fetch nuget | Where-Object { $_ } | Select-Object -Last 1
          if (-not $nuget) { throw "Failed to fetch vcpkg nuget" }
          Write-Host "nuget: $nuget"
          cmd /c "`"$nuget`" sources Remove -Name GitHubPackages 2>nul || exit /b 0"
          & $nuget sources add -Source "$env:FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "${{ github.repository_owner }}" -Password "$env:GH_PACKAGES_TOKEN"
          & $nuget setapikey "$env:GH_PACKAGES_TOKEN" -Source "$env:FEED_URL"
          echo "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
        continue-on-error: true

      - name: 安装 vcpkg 依赖
        shell: pwsh
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          $env:Path = "$v;" + $env:Path
          $inst = "$v\installed\${{ matrix.triplet }}"
          & "$v\vcpkg.exe" install --triplet ${{ matrix.triplet }} --x-manifest-root=$env:GITHUB_WORKSPACE
          if ('${{ matrix.vpl }}' -eq 'true') {
            pwsh scripts/ci/write-fallback-pc.ps1 -InstallRoot "$inst" -HasVpl
          } else {
            pwsh scripts/ci/write-fallback-pc.ps1 -InstallRoot "$inst"
          }

      - name: 从源码编译 zimg
        shell: pwsh
        run: |
          $zimgRoot = "$env:TEMP\zimg-src"
          Remove-Item -Recurse -Force $zimgRoot -ErrorAction SilentlyContinue
          git clone --depth 1 --recurse-submodules https://github.com/sekrit-twc/zimg.git $zimgRoot
          cd $zimgRoot
          $ver = (Select-String -Path "$zimgRoot\configure.ac" -Pattern 'AC_INIT\(\[zimg\], \[([^\]]+)\]').Matches.Groups[1].Value
          if (-not $ver) { $ver = '3.0.6' }
          $plat = if ($env:VSCMD_ARG_TGT_ARCH -eq 'arm64' -or $env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'ARM64' } else { 'x64' }
          $props = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
            '  <PropertyGroup>',
            '    <WholeProgramOptimization>false</WholeProgramOptimization>',
            '  </PropertyGroup>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '      <WholeProgramOptimization>false</WholeProgramOptimization>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )
          [System.IO.File]::WriteAllLines("$zimgRoot\_msvc\Directory.Build.props", $props, [System.Text.UTF8Encoding]::new($false))
          msbuild "$zimgRoot\_msvc\zimg.sln" /p:Configuration=Release /p:Platform=$plat /t:zimg /p:PlatformToolset=v145 /p:WindowsTargetPlatformVersion=10.0 /p:WholeProgramOptimization=false /m
          $lib = Get-ChildItem "$zimgRoot\_msvc" -Recurse -Filter "z.lib" | Select-Object -First 1
          if (-not $lib) { throw "z.lib not found after building zimg" }
          $prefix = $env:VCPKG_INSTALLED
          New-Item -ItemType Directory -Path "$prefix\include", "$prefix\lib", "$prefix\lib\pkgconfig" -Force | Out-Null
          Copy-Item "$zimgRoot\src\zimg\api\zimg.h" "$prefix\include\zimg.h" -Force
          if (Test-Path "$zimgRoot\src\zimg\api\zimg++.hpp") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.hpp" "$prefix\include\zimg++.hpp" -Force
          } elseif (Test-Path "$zimgRoot\src\zimg\api\zimg++.h") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.h" "$prefix\include\zimg++.h" -Force
          }
          Copy-Item $lib.FullName "$prefix\lib\z.lib" -Force
          Copy-Item $lib.FullName "$prefix\lib\zimg.lib" -Force
          $pcMixed = ($prefix -replace '\\','/')
          $pc = @(
            "prefix=$pcMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: zimg',
            'Description: z.lib image processing library',
            "Version: $ver",
            'Libs: ${libdir}/zimg.lib',
            'Cflags: -I${includedir}'
          )
          [System.IO.File]::WriteAllLines("$prefix\lib\pkgconfig\zimg.pc", $pc, [System.Text.UTF8Encoding]::new($false))
          Write-Host "zimg $ver built for $plat"

      - name: 检查 vcpkg pkg-config
        shell: bash
        run: |
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "未找到 libmp3lame"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "未找到 libfdk-aac"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "未找到 sdl2"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "未找到 vpl"
          $PKG_CONFIG --exists zimg && echo "zimg OK: version=$($PKG_CONFIG --modversion zimg) libs=$($PKG_CONFIG --libs zimg) cflags=$($PKG_CONFIG --cflags zimg)" || echo "未找到 zimg"

      - name: 安装 CUDA 工具包
        if: matrix.cuda
        uses: mjun0812/setup-cuda@v1.5.0
        with:
          version: latest
          method: network

      - name: 检测 CUDA
        if: matrix.cuda
        shell: bash
        run: |
          CUDA_BASE=""
          for base in "/c/Program Files/NVIDIA GPU Computing Toolkit/CUDA" "/c/Program Files/NVIDIA/CUDA"; do
            for d in "$base"/v* "$base"/v*.*; do
              if [ -d "$d/bin" ] && [ -x "$d/bin/nvcc.exe" ]; then CUDA_BASE="$d"; break 2; fi
            done
          done
          [ -z "${CUDA_BASE}" ] && NVCCBIN="$(dirname "$(which nvcc 2>/dev/null || true)" 2>/dev/null || true)" && \
            [ -n "${NVCCBIN}" ] && CUDA_BASE="$(dirname "${NVCCBIN}")"
          [ -z "${CUDA_BASE}" ] && { echo "::error::未找到 CUDA"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc.exe" --version

      - name: 创建 CUDA junction
        if: matrix.cuda
        shell: pwsh
        run: |
          $cuda = $env:CUDA_HOME
          if (-not $cuda) { Write-Error "CUDA_HOME is not set"; exit 1 }
          if ($cuda -match '^/([a-zA-Z])/(.*)$') {
            $cuda = "$($matches[1].ToUpper()):\$($matches[2])" -replace '/', '\\'
          } elseif ($cuda -match '^[a-zA-Z]:') {
            $cuda = $cuda -replace '/', '\\'
          }
          $link = "C:\cuda"
          if (Test-Path $link) { Remove-Item $link -Recurse -Force }
          cmd /c mklink /J "$link" "$cuda" | Out-Null
          if (-not (Test-Path "$link\bin\nvcc.exe")) { Write-Error "Junction failed"; exit 1 }
          echo "CUDA_HOME_MIXED=C:/cuda" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CUDA junction: $link -> $cuda"

      - name: 编译 nv-codec-headers
        if: matrix.cuda
        shell: bash
        run: |
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX="$P" && make PREFIX="$P" install
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: 编译 VMAF
        shell: bash
        run: |
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          sed -i 's/^#ifdef _MSC_VER$/#if defined(_MSC_VER) \&\& !defined(__clang__)/' src/feature/integer_vif.h
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c", "src/feature/cuda/integer_adm_cuda.c"):
              p = pathlib.Path(path)
              if p.exists():
                  s = p.read_text(encoding="utf-8")
                  s = s.replace("#ifdef _MSC_VER\n", "#if defined(_MSC_VER) && !defined(__clang__)\n")
                  p.write_text(s, encoding="utf-8")
          '
          if [ "${{ matrix.cuda }}" = "true" ]; then
            python3 -c '
            import pathlib
            p = pathlib.Path("src/feature/integer_adm.h")
            if p.exists():
                s = p.read_text(encoding="utf-8")
                s = s.replace(
                    "{ .compute_score = 1, .supported_by_any = 1, .ref = 1, .main = 1 }",
                    "{ 1, 1, 1, 1 }")
                p.write_text(s, encoding="utf-8")
            '
            export CUDA_HOME="/c/cuda"
            export CUDA_PATH="/c/cuda"
            export CUDACXX="/c/cuda/bin/nvcc"
            export PATH="/c/cuda/bin:${PATH}"
            CL="/c/cuda/lib/x64"; [ ! -d "$CL" ] && CL="/c/cuda/lib"
          fi
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I${VCPKG_INSTALLED}/include"
            PTHREAD_LDFLAGS="-LIBPATH:${VCPKG_INSTALLED}/lib pthreads.lib"
          fi
          export CFLAGS="-D_USE_MATH_DEFINES${PTHREAD_CFLAGS:+ $PTHREAD_CFLAGS}${CFLAGS:+ $CFLAGS}"
          export CXXFLAGS="-D_USE_MATH_DEFINES${PTHREAD_CFLAGS:+ $PTHREAD_CFLAGS}${CXXFLAGS:+ $CXXFLAGS}"
          export LDFLAGS="${PTHREAD_LDFLAGS:+$PTHREAD_LDFLAGS}${LDFLAGS:+ $LDFLAGS}"
          if [ "${{ matrix.cuda }}" = "true" ]; then
            python3 -c "
            import pathlib
            mb = pathlib.Path('src/meson.build')
            s = mb.read_text(encoding='utf-8')
            s = s.replace(
                "'-I', '../src/' + cuda_dir,",
                "'-I', '../src/' + cuda_dir,
                '-I', '${P_MIXED}/include',
                '-I', '${VCPKG_INSTALLED}/include',")
            mb.write_text(s, encoding='utf-8')
            "
            export INCLUDE="${P_MIXED}/include;${VCPKG_INSTALLED}/include;${CUDA_HOME}/include;${INCLUDE:-}"
          fi
          if command -v nasm >/dev/null 2>&1 || command -v nasm.exe >/dev/null 2>&1; then
            VMAF_ENABLE_ASM=true
          else
            VMAF_ENABLE_ASM=false
            echo "::warning::未找到 nasm，禁用 VMAF 汇编优化"
          fi
          if [ -n "${CLANG_BIN:-}" ] && [ -f "${CLANG_BIN}/clang.exe" ]; then
            CC_BIN="$CLANG_BIN/clang.exe"
          else
            CC_BIN="cl.exe"
          fi
          PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"           meson setup build --buildtype release --prefix="$P" -Denable_cuda=${{ matrix.cuda }} -Denable_asm=$VMAF_ENABLE_ASM -Db_vscrt=mt -Ddefault_library=static
          ninja -vC build
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"
          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::在 build/src 下未找到 VMAF 静态库"; ls -la build/src; exit 1; }
          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=$P_MIXED" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: VMAF library' \
            'Version: 3.0.0' \
            'Libs: -L${libdir} -lvmaf' \
            'Libs.private: -lstdc++ -lm' \
            'Cflags: -I${includedir}' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: 导出 VMAF meson 日志
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: 编译 FFmpeg
        shell: bash
        run: |
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          cd /tmp && rm -rf ffmpeg-src
          git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          python3 "${GITHUB_WORKSPACE}/scripts/ci/patch-ffmpeg-msvc.py" /tmp/ffmpeg-src
          cd ffmpeg-src
          sed -i 's/require libsnappy snappy-c.h snappy_compress -lsnappy -lstdc++/require libsnappy snappy-c.h snappy_compress -lsnappy/' configure
          sed -i 's/require libtwolame twolame.h twolame_init -ltwolame/require libtwolame twolame.h twolame_init -ltwolame -DLIBTWOLAME_STATIC/' configure
          sed -i 's/check_lib libtwolame twolame.h twolame_encode_buffer_float32_interleaved -ltwolame/check_lib libtwolame twolame.h twolame_encode_buffer_float32_interleaved -ltwolame -DLIBTWOLAME_STATIC/' configure
          CUDA_FLAGS=""
          if [ "${{ matrix.cuda }}" = "true" ]; then
            export CUDA_HOME="/c/cuda"
            export CUDA_PATH="/c/cuda"
            export CUDACXX="/c/cuda/bin/nvcc"
            export PATH="/c/cuda/bin:${PATH}"
            CUDA_FLAGS="--enable-cuda-nvcc --enable-cuvid --enable-nvenc"
            CL="${CUDA_HOME_MIXED}/lib/x64"; [ ! -d "/c/cuda/lib/x64" ] && CL="${CUDA_HOME_MIXED}/lib"
          fi
          AMF_FLAGS=""
          if [ "${{ matrix.amf }}" = "true" ]; then
            AMF_DIR="/tmp/AMF"
            [ ! -d "$AMF_DIR" ] && git clone --depth 1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git "$AMF_DIR"
            AMF_INCLUDE_DIR="$AMF_DIR/amf/public/include"
            if [ ! -d "$AMF_INCLUDE_DIR/AMF" ]; then
              mkdir -p "$AMF_INCLUDE_DIR/AMF"
              cp -r "$AMF_INCLUDE_DIR/core" "$AMF_INCLUDE_DIR/components" "$AMF_INCLUDE_DIR/AMF/"
            fi
            AMF_INCLUDE="$(cygpath -m "$AMF_INCLUDE_DIR")"
            AMF_FLAGS="--enable-amf"
          fi
          VPL_FLAGS=""
          if [ "${{ matrix.vpl }}" = "true" ]; then
            VPL_FLAGS="--enable-libvpl"
          fi
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --pkg-config-flags="--static" \
            --extra-cflags="-I$P_MIXED/include -I${VCPKG_INSTALLED}/include ${CUDA_HOME_MIXED:+-I${CUDA_HOME_MIXED}/include} ${AMF_INCLUDE:+-I${AMF_INCLUDE}} -I${VCPKG_INSTALLED}/include/vpl -DLIBTWOLAME_STATIC" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib ${CL:+-LIBPATH:$CL} -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="advapi32.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib cfgmgr32.lib gdi32.lib shell32.lib libcpmt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            ${{ matrix.configure_extra }} --enable-opencl --enable-vulkan \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libdav1d --enable-libopenh264 --enable-libtwolame --enable-libspeex --enable-libjxl --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --enable-d3d11va --enable-d3d12va --enable-dxva2 --enable-mediafoundation --enable-doc
          make -j"$(nproc)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        shell: bash
        run: |
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: 验证
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- HW Accel ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -hwaccels 2>&1 || echo "（无）"
          echo "--- Encoders ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep -iE 'nvenc|amf|qsv|libmp3lame|libfdk_aac' | head -10 || echo "（无）"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        shell: pwsh
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe" dist\ -ErrorAction SilentlyContinue
          $docDir = "$env:USERPROFILE\ffmpeg-install\share\doc\ffmpeg"
          if (Test-Path $docDir) { Copy-Item $docDir dist\doc -Recurse -Force }
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }} -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  macos-arm:
    name: macOS ARM（VideoToolbox）
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装依赖
        run: |
          brew install yasm nasm pkg-config meson ninja cmake wget lame fdk-aac sdl2 x264 x265 libvpx opus libvorbis theora aom webp libass freetype fontconfig zimg libsoxr openjpeg snappy molten-vk shaderc svt-av1 dav1d kvazaar openh264 xvid twolame speex codec2 jpeg-xl libopenmpt libbs2b aribb24 libplacebo rubberband libvidstab

      - name: 编译 VMAF（CPU）
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: 编译 FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          LAME_PREFIX="$(brew --prefix lame)"
          FDK_PREFIX="$(brew --prefix fdk-aac)"
          # Homebrew 的 lame 不带 .pc 文件，手动生成 libmp3lame.pc
          LAME_INCLUDE=$(ls -d "${LAME_PREFIX}/include"/*/ 2>/dev/null | head -1 || echo "${LAME_PREFIX}/include")
          {
            echo "prefix=${LAME_PREFIX}"
            echo 'exec_prefix=${prefix}'
            echo "libdir=${LAME_PREFIX}/lib"
            echo "includedir=${LAME_INCLUDE}"
            echo ""
            echo "Name: libmp3lame"
            echo "Description: LAME MP3 encoder library"
            echo "Version: 3.100"
            echo 'Libs: -L${libdir} -lmp3lame'
            echo 'Cflags: -I${includedir}'
          } > "${P}/lib/pkgconfig/libmp3lame.pc"
          # fdk-aac 有 .pc 但 ffmpeg 需要 libfdk-aac 名
          [ -f "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" ] && ln -sf "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" "${P}/lib/pkgconfig/libfdk-aac.pc"
          BREW_PREFIX="$(brew --prefix)"
          MVK_PREFIX="$(brew --prefix molten-vk 2>/dev/null || true)"
          if [ -d "${MVK_PREFIX}/libexec/include" ]; then
            MVK_CFLAGS="-I${MVK_PREFIX}/libexec/include"
            MVK_LDFLAGS="-L${MVK_PREFIX}/lib -Wl,-rpath,${MVK_PREFIX}/lib"
          else
            MVK_CFLAGS=""
            MVK_LDFLAGS=""
          fi
          # 复制并修复 Homebrew 的 .pc（macOS 没有 libstdc++）
          for pc_dir in "${BREW_PREFIX}/lib/pkgconfig" /opt/homebrew/opt/*/lib/pkgconfig; do
            [ -d "$pc_dir" ] || continue
            for pc in "$pc_dir"/*.pc; do
              [ -f "$pc" ] || continue
              base=$(basename "$pc")
              sed 's/-lstdc++/-lc++/g' "$pc" > "${P}/lib/pkgconfig/$base"
            done
          done
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${LAME_PREFIX}/lib/pkgconfig:${FDK_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          pkg-config --exists libmp3lame && echo "pkg-config libmp3lame: OK ($(pkg-config --modversion libmp3lame))" || echo "pkg-config libmp3lame: FAIL"
          pkg-config --exists libfdk-aac  && echo "pkg-config libfdk-aac: OK ($(pkg-config --modversion libfdk-aac))"   || echo "pkg-config libfdk-aac: FAIL"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          # macOS 使用 libc++，configure 里 libsnappy 的 -lstdc++ 会导致检测失败
          sed -i.bak 's/require libsnappy snappy-c.h snappy_compress -lsnappy -lstdc++/require libsnappy snappy-c.h snappy_compress -lsnappy/' configure
          rm -f configure.bak
          ./configure --prefix="$P" \
            --extra-cflags="-I$P/include -I${BREW_PREFIX}/include -I${LAME_PREFIX}/include -I${FDK_PREFIX}/include ${MVK_CFLAGS}" \
            --extra-ldflags="-L$P/lib -L${BREW_PREFIX}/lib -L${LAME_PREFIX}/lib -L${FDK_PREFIX}/lib ${MVK_LDFLAGS}" \
            --extra-libs="-lpthread -lm" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libmp3lame --enable-libfdk-aac --enable-opencl --enable-vulkan \
            --enable-libsvtav1 --enable-libdav1d --enable-libkvazaar --enable-libopenh264 --enable-libxvid --enable-libtwolame --enable-libspeex --enable-libcodec2 --enable-libjxl --enable-libopenmpt --enable-libbs2b --enable-libaribb24 --enable-libplacebo --enable-librubberband --enable-libvidstab \
            --enable-sdl2 --enable-videotoolbox --enable-audiotoolbox \
            --enable-hwaccel=h264_videotoolbox --enable-hwaccel=hevc_videotoolbox \
            --enable-hwaccel=vp9_videotoolbox --enable-hwaccel=prores_videotoolbox \
            --enable-hwaccel=av1_videotoolbox --enable-doc
          make -j"$(sysctl -n hw.logicalcpu)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        run: |
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== ffbuild/config.log (LAME section) ==="
          grep -A20 'libmp3lame' /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(no libmp3lame section)"

      - name: 裁剪、签名与验证
        run: |
          FF="${HOME}/ffmpeg-install/bin/ffmpeg"
          strip "${FF}" "${FF/%ffmpeg/ffprobe}" "${FF/%ffmpeg/ffplay}" 2>/dev/null || true
          for bin in ffmpeg ffprobe ffplay; do codesign --force --sign - "${HOME}/ffmpeg-install/bin/${bin}" 2>/dev/null || true; done
          "${FF}" -version 2>&1 | head -n5
          echo "--- HW Accel Methods ---"
          "${FF}" -hide_banner -hwaccels 2>&1 || echo "（无）"
          echo "--- VideoToolbox encoders ---"
          "${FF}" -hide_banner -encoders 2>&1 | grep -iE 'h264_videotoolbox|hevc_videotoolbox|prores_videotoolbox' || echo "（无）"
          echo "--- VT hwaccel decode support (via -hwaccel videotoolbox) ---"
          # Modern ffmpeg (6.0+) uses the hwaccel framework for VT decoding, not standalone decoder wrappers.
          # Each --enable-hwaccel=xxx_videotoolbox registers a codec backend under the unified 'videotoolbox' hwaccel.
          # Verify by checking that 'videotoolbox' is listed in -hwaccels AND that each hw-codec is recognized.
          echo "  hwaccel videotoolbox available: $("${FF}" -hide_banner -hwaccels 2>&1 | grep -q videotoolbox && echo YES || echo NO)"
          for c in h264 hevc vp9 prores av1; do
            echo "  hw-codec ${c}: $("${FF}" -hide_banner -hwaccel videotoolbox -codecs 2>&1 | grep -i "${c}" | head -1 || echo '(not listed)')"
          done
          echo "--- VMAF ---"
          "${FF}" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          [ -d "${HOME}/ffmpeg-install/share/doc/ffmpeg" ] && cp -r "${HOME}/ffmpeg-install/share/doc/ffmpeg" dist/doc || true
          cd dist && tar -cJf ../ffmpeg-macos-arm.tar.xz .

      - uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-macos-arm
          path: ffmpeg-macos-arm.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS ARM64 — Snapdragon (Software Encoders + D3D11VA)
  # ============================================================
  release:
    name: 创建 GitHub Release
    needs:
      - metadata
      - linux
      - windows
      - macos-arm
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: FFmpeg ${{ needs.metadata.outputs.release_tag }}
          body: |
            ## 🎬 FFmpeg 多厂商构建

            每个压缩包都包含 **ffmpeg + ffprobe + ffplay**，并带厂商特定的硬件加速。

            ### 📦 Linux（x86_64）

            | 产物 | GPU | 硬件加速 | VMAF |
            |---|---|---|---|
            | `ffmpeg-linux-nvidia.tar.xz` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-linux-intel-qsv.tar.xz` | Intel | QSV (oneVPL) + VAAPI | ✅ CPU |
            | `ffmpeg-linux-amd.tar.xz` | AMD | VAAPI | ✅ CPU |
            | `ffmpeg-linux-x86-all.tar.xz` | NVIDIA + Intel + AMD | NVENC/CUDA + QSV + VAAPI | ✅ CUDA |

            ### 📦 Linux（ARM64）

            | 产物 | GPU | 硬件加速 | VMAF |
            |---|---|---|---|
            | `ffmpeg-linux-arm.tar.xz` | — | VAAPI / CPU | ✅ CPU |

            ### 📦 Windows（x86_64，MSVC）

            | 产物 | GPU | 硬件加速 | VMAF |
            |---|---|---|---|
            | `ffmpeg-windows-nvidia.zip` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-windows-amd-amf.zip` | AMD | AMF | ✅ CPU |
            | `ffmpeg-windows-intel-qsv.zip` | Intel | QSV (oneVPL) | ✅ CPU |
            | `ffmpeg-windows-x86-all.zip` | NVIDIA + Intel + AMD | NVENC/CUDA + QSV + AMF | ✅ CUDA |

            ### 📦 Windows（ARM64，MSVC）

            | 产物 | CPU | 硬件加速 | VMAF |
            |---|---|---|---|
            | `ffmpeg-windows-arm64.zip` | Snapdragon X | D3D11VA / DXVA2 / MF | ✅ CPU |

            ### 📦 macOS（ARM64）

            | 产物 | GPU | 硬件加速 | VMAF |
            |---|---|---|---|
            | `ffmpeg-macos-arm.tar.xz` | Apple | VideoToolbox | ✅ CPU |

            > 所有构建均包含： libmp3lame + libfdk-aac + SDL2 (ffplay) + libx264 + libx265 + libvpx + libopus + libvorbis + libtheora + libaom + libwebp + libass + libfreetype + fontconfig + libzimg + libsoxr + libopenjpeg + libsnappy
            > Windows 构建使用 MSVC 2026 编译，需要 VC++ 可再发行组件。
          files: release-assets/*
          draft: false
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
