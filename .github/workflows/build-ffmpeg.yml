name: Build FFmpeg Multi-Vendor

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - '.github/workflows/build-ffmpeg.yml'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # LINUX — NVIDIA (NVENC/CUDA + VMAF-CUDA)
  # ============================================================
  linux-nvidia:
    name: Linux (NVIDIA NVENC/CUDA)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates gnupg python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev

      - name: Install CUDA Toolkit
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget
          # Add NVIDIA CUDA repository for Ubuntu 24.04
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-toolkit-13-3
          # Make CUDA discoverable via /usr/local/cuda symlink
          sudo ln -sf /usr/local/cuda-13.3 /usr/local/cuda 2>/dev/null || true

      - name: Detect CUDA
        run: |
          CUDA_BASE=""
          for d in /usr/local/cuda-* /usr/local/cuda; do
            if [ -d "$d/bin" ] && [ -x "$d/bin/nvcc" ]; then CUDA_BASE="$d"; break; fi
          done
          [ -z "${CUDA_BASE}" ] && { echo "::error::CUDA not found"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc" --version

      - name: Build nv-codec-headers
        run: |
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX=/usr/local
          sudo make PREFIX=/usr/local install

      - name: Build VMAF-CUDA
        run: |
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          export CUDA_PATH="${CUDA_HOME}" CUDACXX="${CUDA_HOME}/bin/nvcc"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          export C_INCLUDE_PATH="${CUDA_HOME}/include:${C_INCLUDE_PATH:-}"
          meson setup build --buildtype release --prefix="${HOME}/ffmpeg-install" --libdir=lib \
            -Denable_cuda=true -Dc_link_args="-lstdc++" -Dcpp_link_args="-lstdc++"
          ninja -vC build && ninja -C build install

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="${HOME}/ffmpeg-install" --pkg-config-flags="--static" \
            --extra-cflags="-I${HOME}/ffmpeg-install/include -I${CUDA_HOME}/include" \
            --extra-ldflags="-L${HOME}/ffmpeg-install/lib -L${CUDA_HOME}/lib64 -Wl,-rpath,${HOME}/ffmpeg-install/lib" \
            --extra-libs="-lpthread -lm -ldl -lstdc++" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc \
            --enable-cuvid --enable-nvenc --disable-libnpp \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Strip & verify
        run: |
          P="${HOME}/ffmpeg-install"
          export LD_LIBRARY_PATH="${P}/lib:${LD_LIBRARY_PATH:-}"
          strip "${P}/bin/ffmpeg" "${P}/bin/ffprobe" "${P}/bin/ffplay" 2>/dev/null || true
          "${P}/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- NVENC ---"
          "${P}/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc' || echo "(none)"
          echo "--- VMAF ---"
          "${P}/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-nvidia.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-nvidia
          path: ffmpeg-linux-nvidia.tar.xz
          retention-days: 30

  # ============================================================
  # LINUX — Intel (QSV via oneVPL + VAAPI)
  # ============================================================
  linux-intel-qsv:
    name: Linux (Intel QSV)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libva-dev libvpl-dev libdrm-dev

      - name: Build VMAF (CPU)
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" --libdir=lib -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$P" --pkg-config-flags="--static" \
            --extra-cflags="-I$P/include" \
            --extra-ldflags="-L$P/lib -Wl,-rpath,$P/lib" \
            --extra-libs="-lpthread -lm -ldl" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libvpl --enable-vaapi \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Strip & verify
        run: |
          export LD_LIBRARY_PATH="${HOME}/ffmpeg-install/lib:${LD_LIBRARY_PATH:-}"
          strip "${HOME}/ffmpeg-install/bin/ffmpeg" "${HOME}/ffmpeg-install/bin/ffprobe" "${HOME}/ffmpeg-install/bin/ffplay" 2>/dev/null || true
          "${HOME}/ffmpeg-install/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "(none)"
          echo "--- VAAPI ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_vaapi' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-intel-qsv.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-intel-qsv
          path: ffmpeg-linux-intel-qsv.tar.xz
          retention-days: 30

  # ============================================================
  # LINUX — AMD (VAAPI)
  # ============================================================
  linux-amd:
    name: Linux (AMD VAAPI)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libva-dev libdrm-dev

      - name: Build VMAF (CPU)
        run: |
          P="${HOME}/ffmpeg-install"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          meson setup build --buildtype release --prefix="$P" --libdir=lib -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$P" --pkg-config-flags="--static" \
            --extra-cflags="-I$P/include" \
            --extra-ldflags="-L$P/lib -Wl,-rpath,$P/lib" \
            --extra-libs="-lpthread -lm -ldl" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-vaapi \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Strip & verify
        run: |
          export LD_LIBRARY_PATH="${HOME}/ffmpeg-install/lib:${LD_LIBRARY_PATH:-}"
          strip "${HOME}/ffmpeg-install/bin/ffmpeg" "${HOME}/ffmpeg-install/bin/ffprobe" "${HOME}/ffmpeg-install/bin/ffplay" 2>/dev/null || true
          "${HOME}/ffmpeg-install/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- VAAPI ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_vaapi' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-amd.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-amd
          path: ffmpeg-linux-amd.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS — NVIDIA (NVENC/CUDA + VMAF-CUDA)
  # ============================================================
  windows-nvidia:
    name: Windows (NVIDIA NVENC/CUDA)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (VS 2026)
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64, vsversion: "18.0" }

      - name: Install build tools
        shell: powershell
        run: |
          # Chocolatey pkgconfiglite is unreliable on Windows; use Git for Windows' pkg-config
          choco install -y --no-progress nasm make activeperl ninja
          pip install meson
          refreshenv
          # NASM may install under Program Files; expose it explicitly so bash ./configure can find it
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) {
            echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "nasm found at $nasmDir"
          } else {
            Write-Host "::warning::nasm.exe not found in expected locations"
          }
          # Ensure nasm is on PATH for bash steps.
          # pkg-config will be provided by vcpkg's pkgconf port (installed later).
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # Remove Strawberry Perl from PATH: its pkg-config is broken and its ccache
          # breaks meson. GITHUB_ENV propagates the cleaned PATH to subsequent steps.
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # Use VS-provided Clang for libvmaf if available.
          # Clang is used for libvmaf only; FFmpeg itself continues to use MSVC (cl.exe).
          # If no Clang is found, the Build VMAF step falls back to MSVC with -Denable_asm=false.
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          if ($clangDir) {
            Write-Host "VS Clang found at $clangDir"
            echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            # Expose the VS Clang directory to bash steps so they can use an absolute
            # path and avoid picking up a different clang (e.g. from MinGW/LLVM) earlier
            # in PATH.
            $clangDirUnix = $clangDir -replace '\\','/'
            echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::warning::VS Clang not found; VMAF will fall back to MSVC with -Denable_asm=false"
          }

      - name: vcpkg deps
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          & "$v\vcpkg.exe" install --triplet x64-windows pkgconf mp3lame fdk-aac sdl2 libiconv zlib pthreads
          $inst = "$v\installed\x64-windows"
          # Convert to forward slashes so pkg-config (bash) can use the path
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              $p = Join-Path "$inst\lib" "$name.lib"
              if (Test-Path $p) { return "$name.lib" }
            }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }

          # vcpkg ports do not always ship pkg-config files; create the ones ffmpeg expects.
          $lameLib = Find-ImportLib @('mp3lame','libmp3lame')
          if (-not $lameLib) { throw "mp3lame import library not found under $inst\lib" }
          # For MSVC we already pass -I/-LIBPATH via --extra-cflags/--extra-ldflags,
          # so the .pc files only need to declare the library name. This avoids -L
          # flags that the MSVC linker may not handle during configure tests.
          Write-Utf8 "$pcDir/libmp3lame.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            "Libs: $lameLib"
          )

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            'Version: 2.0.2',
            "Libs: $fdkLib"
          )
          # SDL2 is required by ffplay; vcpkg does not always ship sdl2.pc
          $sdl2Lib = Find-ImportLib @('SDL2')
          if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
          $sdl2mainLib = Find-ImportLib @('SDL2main')
          $sdl2Libs = if ($sdl2mainLib) { "-lSDL2main -lSDL2" } else { "-lSDL2" }
          Write-Utf8 "$pcDir/sdl2.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: sdl2',
            'Description: Simple DirectMedia Layer',
            'Version: 2.30.0',
            "Libs: $sdl2Libs",
            'Cflags: -I${includedir} -I${includedir}/SDL2'
          )

          # Also create alternate import-library names so ffmpeg's non-pkg-config
          # fallbacks (-lmp3lame, -lfdk-aac) can find the files.
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $lameLib "mp3lame.lib"
          Ensure-LibAlias $lameLib "libmp3lame.lib"
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          if ($vplLib) {
            Ensure-LibAlias $vplLib "vpl.lib"
            Ensure-LibAlias $vplLib "libvpl.lib"
          }

          # pkg-config implementation from vcpkg (Git for Windows lacks it on this runner)
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "Installed import libraries:"
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          Write-Host "libmp3lame.pc:"
          Get-Content "$pcDir/libmp3lame.pc"
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check vcpkg pkg-config
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "libmp3lame NOT FOUND"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "libfdk-aac NOT FOUND"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "sdl2 NOT FOUND"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "vpl NOT FOUND"

      - name: Install CUDA Toolkit
        shell: powershell
        run: |
          # Check if CUDA already installed
          $nvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if ($nvcc) { Write-Host "CUDA found: $($nvcc.Source)"; exit 0 }
          Write-Host "Installing CUDA via Chocolatey..."
          choco install cuda -y --no-progress --version=13.3.0
          refreshenv
          # Add to PATH for current session
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3\bin"
          if (Test-Path $cudaPath) { $env:PATH = "$cudaPath;$env:PATH" }

      - name: Detect CUDA
        shell: bash
        run: |
          CUDA_BASE=""
          for base in "/c/Program Files/NVIDIA GPU Computing Toolkit/CUDA" "/c/Program Files/NVIDIA/CUDA"; do
            [ -d "$base" ] && for d in "$base"/v*; do
              d2="$(dirname "$d" 2>/dev/null || echo "$d")/$(basename "$d")"
              if [ -d "${d}/bin" ] && [ -f "${d}/bin/nvcc.exe" ]; then CUDA_BASE="${d}"; break 2; fi
            done
          done
          # Fallback: locate via PATH
          [ -z "${CUDA_BASE}" ] && NVCCBIN="$(dirname "$(which nvcc 2>/dev/null || true)" 2>/dev/null || true)" && \
            [ -n "${NVCCBIN}" ] && CUDA_BASE="$(dirname "${NVCCBIN}")"
          [ -z "${CUDA_BASE}" ] && { echo "::error::CUDA not found"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc.exe" --version

      - name: Create CUDA junction
        shell: powershell
        run: |
          $cuda = $env:CUDA_HOME
          if (-not $cuda) { Write-Error "CUDA_HOME is not set"; exit 1 }
          # Detect CUDA writes an MSYS-style path (/c/...); mklink needs a Windows path.
          if ($cuda -match '^/([a-zA-Z])/(.*)$') {
            $cuda = "$($matches[1].ToUpper()):\$($matches[2])" -replace '/', '\\'
          } elseif ($cuda -match '^[a-zA-Z]:') {
            $cuda = $cuda -replace '/', '\\'
          }
          $link = "C:\cuda"
          if (Test-Path $link) {
            # Remove junction/directory forcefully, including read-only or in-use items
            cmd /c "rmdir /S /Q `"$link`"" | Out-Null
            if (Test-Path $link) { Remove-Item $link -Recurse -Force -ErrorAction SilentlyContinue }
          }
          cmd /c mklink /J "$link" "$cuda" | Out-Null
          if (-not (Test-Path "$link\bin\nvcc.exe")) {
            Write-Error "Junction created but nvcc.exe not found at $link\bin\nvcc.exe (source: $cuda)"
            exit 1
          }
          echo "CUDA_HOME_MIXED=C:/cuda" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CUDA junction: $link -> $cuda"

      - name: Build nv-codec-headers
        shell: bash
        run: |
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX="$P" && make PREFIX="$P" install
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build VMAF-CUDA (MSVC)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # Patch VMAF for Clang + MSVC target: don't redefine __builtin_clz under Clang
          sed -i 's/^#ifdef _MSC_VER$/#if defined(_MSC_VER) \&\& !defined(__clang__)/' src/feature/integer_vif.h
          # Patch mkdirp.c/.h for Windows: unistd.h/sys/types.h are not available,
          # use direct.h and define mode_t; use _mkdir on Windows.
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c", "src/feature/cuda/integer_adm_cuda.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              p.write_text(s, encoding="utf-8")
              compat_dir = pathlib.Path("src/compat/msvc/common")
              compat_dir.mkdir(parents=True, exist_ok=True)
              (compat_dir / "attributes.h").write_text(
                  "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#endif\n"
              )
          '
          # nvcc (CUDA .cu) compiles as C++ and does not support C11 designated initializers
          # before C++20. Rewrite the one struct in integer_adm.h to positional initialization.
          python3 -c '
          import pathlib
          p = pathlib.Path("src/feature/integer_adm.h")
          if p.exists():
              s = p.read_text(encoding="utf-8")
              s = s.replace(
                  "static const struct dwt_model_params dwt_7_9_YCbCr_threshold[3] = {\n"
                  "    {.a = 0.495, .k = 0.466, .f0 = 0.401, .g = {1.501, 1.0, 0.534, 1.0}},\n"
                  "    {.a = 1.633, .k = 0.353, .f0 = 0.209, .g = {1.520, 1.0, 0.502, 1.0}},\n"
                  "    {.a = 0.944, .k = 0.521, .f0 = 0.404, .g = {1.868, 1.0, 0.516, 1.0}}};",
                  "static const struct dwt_model_params dwt_7_9_YCbCr_threshold[3] = {\n"
                  "    {0.495, 0.466, 0.401, {1.501, 1.0, 0.534, 1.0}},\n"
                  "    {1.633, 0.353, 0.209, {1.520, 1.0, 0.502, 1.0}},\n"
                  "    {0.944, 0.521, 0.404, {1.868, 1.0, 0.516, 1.0}}};")
              p.write_text(s, encoding="utf-8")
          '
          # Use the space-free junction for nvcc so meson does not have to quote a path with spaces.
          export CUDA_HOME="/c/cuda"
          export CUDA_PATH="/c/cuda"
          export CUDACXX="/c/cuda/bin/nvcc"
          export PATH="/c/cuda/bin:${PATH}"
          CL="/c/cuda/lib/x64"; [ ! -d "$CL" ] && CL="/c/cuda/lib"
          # Ensure MSVC link.exe before Git's link.EXE for meson
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # nv-codec-headers provides ffnvcodec.pc; meson needs PKG_CONFIG_PATH to find it
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          # PThreads4W (installed via vcpkg) provides pthread.h on Windows
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "Using PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::pthread.h found but no pthread*.lib under ${VCPKG_INSTALLED}/lib"
              exit 1
            fi
          fi
          # Convert paths to mixed (C:/...) form so spaces inside paths stay as single argv tokens
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          CUDA_HOME_MIXED="$(cygpath -m "$CUDA_HOME" 2>/dev/null || echo "$CUDA_HOME")"
          VCPKG_INSTALLED_MIXED=""
          if [ -n "${VCPKG_INSTALLED:-}" ]; then
            VCPKG_INSTALLED_MIXED="$(cygpath -m "$VCPKG_INSTALLED" 2>/dev/null || echo "$VCPKG_INSTALLED")"
          fi
          # nvcc fatbin uses a hard-coded custom_target command; inject extra include dirs
          # so CUDA .cu files can find ffnvcodec headers (from nv-codec-headers) and pthread.h.
          python3 -c "
          import pathlib
          mb = pathlib.Path('src/meson.build')
          s = mb.read_text(encoding='utf-8')
          s = s.replace(
              \"'-I', '../src/' + cuda_dir,\",
              \"'-I', '../src/' + cuda_dir,\\n                '-I', '${P_MIXED}/include',\\n                '-I', '${VCPKG_INSTALLED_MIXED}/include',\")
          mb.write_text(s, encoding='utf-8')
          "
          # nvcc host compiler (cl) also consults INCLUDE on Windows
          export INCLUDE="${P_MIXED}/include;${VCPKG_INSTALLED_MIXED}/include;${CUDA_HOME_MIXED}/include;${INCLUDE:-}"
          # VMAF asm needs nasm on x86/x64; gracefully disable if it is not available.
          if command -v nasm >/dev/null 2>&1 || command -v nasm.exe >/dev/null 2>&1; then
            VMAF_ENABLE_ASM=true
          else
            VMAF_ENABLE_ASM=false
            echo "::warning::nasm not found, disabling VMAF asm optimizations"
          fi
          # Helper: build a Meson array literal from positional args (handles spaces safely)
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          if [ -n "${CLANG_BIN:-}" ] && [ -f "${CLANG_BIN}/clang.exe" ]; then
            if [ "$VMAF_ENABLE_ASM" = "true" ]; then
              echo "Building VMAF with VS Clang (MSVC target) to keep AVX2 asm"
            else
              echo "Building VMAF with VS Clang (MSVC target) (nasm missing, disabling asm)"
            fi
            VMAF_C_ARGS=$(__meson_array "-MD" "-I${P_MIXED}/include" "-I${CUDA_HOME_MIXED}/include" "--target=x86_64-pc-windows-msvc" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_CPP_ARGS=$(__meson_array "-MD" "--target=x86_64-pc-windows-msvc" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            CC="${CLANG_BIN}/clang.exe" CXX="${CLANG_BIN}/clang++.exe" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=true -Denable_asm=${VMAF_ENABLE_ASM} -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dcpp_args="$VMAF_CPP_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS" \
              -Dcpp_link_args="$VMAF_LINK_ARGS"
          else
            echo "::warning::VS Clang not found, falling back to MSVC with -Denable_asm=false"
            VMAF_C_ARGS=$(__meson_array "-MD" "-I${P_MIXED}/include" "-I${CUDA_HOME_MIXED}/include" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=true -Denable_asm=false -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS"
          fi
          ninja -vC build

          # Manual install: build a static libvmaf on Windows/Clang to avoid DLL import-library issues.
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::VMAF static library not found under build/src"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -lucrt -lmsvcrt -lvcruntime -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: Dump VMAF meson log
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: Build FFmpeg (MSVC)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          CUDA_HOME_MIXED="C:/cuda"
          # Make nvcc discoverable for --enable-cuda-nvcc
          export CUDA_HOME="/c/cuda"
          export CUDA_PATH="/c/cuda"
          export CUDACXX="/c/cuda/bin/nvcc"
          export PATH="/c/cuda/bin:${PATH}"
          if [ ! -x "/c/cuda/bin/nvcc" ]; then
            echo "::error::nvcc not found at /c/cuda/bin/nvcc"
            ls -la /c/cuda/bin 2>/dev/null || echo "(cannot list /c/cuda/bin)"
            exit 1
          fi
          echo "nvcc: $(which nvcc)"
          nvcc --version
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          # Normalize pkg-config path so bash/ffmpeg configure can execute it reliably
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo NOT FOUND))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # Patch ffbuild/library.mak so lib.exe receives a Windows-absolute response file path.
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          CL="${CUDA_HOME_MIXED}/lib/x64"; [ ! -d "/c/cuda/lib/x64" ] && CL="${CUDA_HOME_MIXED}/lib"
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --extra-cflags="-MD -I$P_MIXED/include -I${CUDA_HOME_MIXED}/include -I${VCPKG_INSTALLED}/include" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:$CL -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ucrt.lib msvcrt.lib vcruntime.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc \
            --enable-cuvid --enable-nvenc --disable-libnpp \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Dump ffbuild/config.log on failure
        if: failure()
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: Copy DLLs
        shell: powershell
        run: |
          $src = "$env:VCPKG_INSTALLED\bin"
          $dst = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Get-ChildItem "$src\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $dst -Force
            Write-Host "  copied $($_.Name)"
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- NVENC ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc' || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-nvidia.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-nvidia
          path: ffmpeg-windows-nvidia.zip
          retention-days: 30

  # ============================================================
  # WINDOWS — AMD (AMF)
  # ============================================================
  windows-amd-amf:
    name: Windows (AMD AMF)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (VS 2026)
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64, vsversion: "18.0" }

      - name: Install build tools
        shell: powershell
        run: |
          # Chocolatey pkgconfiglite is unreliable; use Git for Windows' pkg-config
          choco install -y --no-progress nasm make activeperl ninja
          pip install meson
          refreshenv
          # NASM may install under Program Files; expose it explicitly so bash ./configure can find it
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) {
            echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "nasm found at $nasmDir"
          } else {
            Write-Host "::warning::nasm.exe not found in expected locations"
          }
          # Ensure nasm is on PATH for bash steps.
          # pkg-config will be provided by vcpkg's pkgconf port (installed later).
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # Remove Strawberry Perl from PATH: its pkg-config is broken and its ccache
          # breaks meson. GITHUB_ENV propagates the cleaned PATH to subsequent steps.
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # Use VS-provided Clang for libvmaf if available.
          # Clang is used for libvmaf only; FFmpeg itself continues to use MSVC (cl.exe).
          # If no Clang is found, the Build VMAF step falls back to MSVC with -Denable_asm=false.
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          if ($clangDir) {
            Write-Host "VS Clang found at $clangDir"
            echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            # Expose the VS Clang directory to bash steps so they can use an absolute
            # path and avoid picking up a different clang (e.g. from MinGW/LLVM) earlier
            # in PATH.
            $clangDirUnix = $clangDir -replace '\\','/'
            echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::warning::VS Clang not found; VMAF will fall back to MSVC with -Denable_asm=false"
          }

      - name: vcpkg deps
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          & "$v\vcpkg.exe" install --triplet x64-windows pkgconf mp3lame fdk-aac sdl2 libiconv zlib pthreads
          $inst = "$v\installed\x64-windows"
          # Convert to forward slashes so pkg-config (bash) can use the path
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              $p = Join-Path "$inst\lib" "$name.lib"
              if (Test-Path $p) { return "$name.lib" }
            }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }

          # vcpkg ports do not always ship pkg-config files; create the ones ffmpeg expects.
          $lameLib = Find-ImportLib @('mp3lame','libmp3lame')
          if (-not $lameLib) { throw "mp3lame import library not found under $inst\lib" }
          # For MSVC we already pass -I/-LIBPATH via --extra-cflags/--extra-ldflags,
          # so the .pc files only need to declare the library name. This avoids -L
          # flags that the MSVC linker may not handle during configure tests.
          Write-Utf8 "$pcDir/libmp3lame.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            "Libs: $lameLib"
          )

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            'Version: 2.0.2',
            "Libs: $fdkLib"
          )
          # SDL2 is required by ffplay; vcpkg does not always ship sdl2.pc
          $sdl2Lib = Find-ImportLib @('SDL2')
          if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
          $sdl2mainLib = Find-ImportLib @('SDL2main')
          $sdl2Libs = if ($sdl2mainLib) { "-lSDL2main -lSDL2" } else { "-lSDL2" }
          Write-Utf8 "$pcDir/sdl2.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: sdl2',
            'Description: Simple DirectMedia Layer',
            'Version: 2.30.0',
            "Libs: $sdl2Libs",
            'Cflags: -I${includedir} -I${includedir}/SDL2'
          )

          # Also create alternate import-library names so ffmpeg's non-pkg-config
          # fallbacks (-lmp3lame, -lfdk-aac) can find the files.
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $lameLib "mp3lame.lib"
          Ensure-LibAlias $lameLib "libmp3lame.lib"
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          if ($vplLib) {
            Ensure-LibAlias $vplLib "vpl.lib"
            Ensure-LibAlias $vplLib "libvpl.lib"
          }

          # pkg-config implementation from vcpkg (Git for Windows lacks it on this runner)
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "Installed import libraries:"
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          Write-Host "libmp3lame.pc:"
          Get-Content "$pcDir/libmp3lame.pc"
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check vcpkg pkg-config
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "libmp3lame NOT FOUND"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "libfdk-aac NOT FOUND"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "sdl2 NOT FOUND"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "vpl NOT FOUND"

      - name: Build VMAF (CPU)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # Patch VMAF for Clang + MSVC target: don't redefine __builtin_clz under Clang
          sed -i 's/^#ifdef _MSC_VER$/#if defined(_MSC_VER) \&\& !defined(__clang__)/' src/feature/integer_vif.h
          # Patch mkdirp.c/.h for Windows: unistd.h/sys/types.h are not available,
          # use direct.h and define mode_t; use _mkdir on Windows.
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c", "src/feature/cuda/integer_adm_cuda.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              p.write_text(s, encoding="utf-8")
              compat_dir = pathlib.Path("src/compat/msvc/common")
              compat_dir.mkdir(parents=True, exist_ok=True)
              (compat_dir / "attributes.h").write_text(
                  "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#endif\n"
              )
          '
          # Ensure MSVC link.exe before Git's link.EXE for meson
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # PThreads4W (installed via vcpkg) provides pthread.h on Windows
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "Using PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::pthread.h found but no pthread*.lib under ${VCPKG_INSTALLED}/lib"
              exit 1
            fi
          fi
          # VMAF asm needs nasm on x86/x64; gracefully disable if it is not available.
          if command -v nasm >/dev/null 2>&1 || command -v nasm.exe >/dev/null 2>&1; then
            VMAF_ENABLE_ASM=true
          else
            VMAF_ENABLE_ASM=false
            echo "::warning::nasm not found, disabling VMAF asm optimizations"
          fi
          # Helper: build a Meson array literal from positional args (handles spaces safely)
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          if [ -n "${CLANG_BIN:-}" ] && [ -f "${CLANG_BIN}/clang.exe" ]; then
            if [ "$VMAF_ENABLE_ASM" = "true" ]; then
              echo "Building VMAF with VS Clang (MSVC target) to keep AVX2 asm"
            else
              echo "Building VMAF with VS Clang (MSVC target) (nasm missing, disabling asm)"
            fi
            VMAF_C_ARGS=$(__meson_array "-MD" "--target=x86_64-pc-windows-msvc" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_CPP_ARGS=$(__meson_array "-MD" "--target=x86_64-pc-windows-msvc" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            CC="${CLANG_BIN}/clang.exe" CXX="${CLANG_BIN}/clang++.exe" \
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=${VMAF_ENABLE_ASM} -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dcpp_args="$VMAF_CPP_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS" \
              -Dcpp_link_args="$VMAF_LINK_ARGS"
          else
            echo "::warning::VS Clang not found, falling back to MSVC with -Denable_asm=false"
            VMAF_C_ARGS=$(__meson_array "-MD" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=false -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS"
          fi
          ninja -vC build

          # Manual install: build a static libvmaf on Windows/Clang to avoid DLL import-library issues.
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::VMAF static library not found under build/src"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -lucrt -lmsvcrt -lvcruntime -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: Dump VMAF meson log
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: Build FFmpeg (MSVC)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          # Normalize pkg-config path so bash/ffmpeg configure can execute it reliably
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo NOT FOUND))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # Patch ffbuild/library.mak so lib.exe receives a Windows-absolute response file path.
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          # AMF public headers are not shipped by vcpkg. FFmpeg expects #include <AMF/core/Version.h>,
          # so create an AMF/ wrapper directory inside the AMF include path.
          AMF_DIR="/tmp/AMF"
          [ ! -d "$AMF_DIR" ] && git clone --depth 1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git "$AMF_DIR"
          AMF_INCLUDE_DIR="$AMF_DIR/amf/public/include"
          if [ ! -d "$AMF_INCLUDE_DIR/AMF" ]; then
            mkdir -p "$AMF_INCLUDE_DIR/AMF"
            cp -r "$AMF_INCLUDE_DIR/core" "$AMF_INCLUDE_DIR/components" "$AMF_INCLUDE_DIR/AMF/"
          fi
          AMF_INCLUDE="$(cygpath -m "$AMF_INCLUDE_DIR")"
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --extra-cflags="-MD -I$P_MIXED/include -I${AMF_INCLUDE} -I${VCPKG_INSTALLED}/include" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ucrt.lib msvcrt.lib vcruntime.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-amf \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Dump ffbuild/config.log on failure
        if: failure()
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: Copy DLLs
        shell: powershell
        run: |
          $src = "$env:VCPKG_INSTALLED\bin"
          $dst = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Get-ChildItem "$src\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $dst -Force
            Write-Host "  copied $($_.Name)"
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- AMF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep '_amf' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-amd-amf.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-amd-amf
          path: ffmpeg-windows-amd-amf.zip
          retention-days: 30

  # ============================================================
  # WINDOWS — Intel (QSV via oneVPL)
  # ============================================================
  windows-intel-qsv:
    name: Windows (Intel QSV)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (VS 2026)
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64, vsversion: "18.0" }

      - name: Install build tools
        shell: powershell
        run: |
          # Chocolatey pkgconfiglite is unreliable; use Git for Windows' pkg-config
          choco install -y --no-progress nasm make activeperl ninja
          pip install meson
          refreshenv
          # NASM may install under Program Files; expose it explicitly so bash ./configure can find it
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) {
            echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "nasm found at $nasmDir"
          } else {
            Write-Host "::warning::nasm.exe not found in expected locations"
          }
          # Ensure nasm is on PATH for bash steps.
          # pkg-config will be provided by vcpkg's pkgconf port (installed later).
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # Remove Strawberry Perl from PATH: its pkg-config is broken and its ccache
          # breaks meson. GITHUB_ENV propagates the cleaned PATH to subsequent steps.
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # Use VS-provided Clang for libvmaf if available.
          # Clang is used for libvmaf only; FFmpeg itself continues to use MSVC (cl.exe).
          # If no Clang is found, the Build VMAF step falls back to MSVC with -Denable_asm=false.
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          if ($clangDir) {
            Write-Host "VS Clang found at $clangDir"
            echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            # Expose the VS Clang directory to bash steps so they can use an absolute
            # path and avoid picking up a different clang (e.g. from MinGW/LLVM) earlier
            # in PATH.
            $clangDirUnix = $clangDir -replace '\\','/'
            echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::warning::VS Clang not found; VMAF will fall back to MSVC with -Denable_asm=false"
          }

      - name: vcpkg deps
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          & "$v\vcpkg.exe" install --triplet x64-windows pkgconf mp3lame fdk-aac sdl2 libiconv zlib pthreads libvpl
          $inst = "$v\installed\x64-windows"
          # Convert to forward slashes so pkg-config (bash) can use the path
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              $p = Join-Path "$inst\lib" "$name.lib"
              if (Test-Path $p) { return "$name.lib" }
            }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }

          # vcpkg ports do not always ship pkg-config files; create the ones ffmpeg expects.
          $lameLib = Find-ImportLib @('mp3lame','libmp3lame')
          if (-not $lameLib) { throw "mp3lame import library not found under $inst\lib" }
          # For MSVC we already pass -I/-LIBPATH via --extra-cflags/--extra-ldflags,
          # so the .pc files only need to declare the library name. This avoids -L
          # flags that the MSVC linker may not handle during configure tests.
          Write-Utf8 "$pcDir/libmp3lame.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            "Libs: $lameLib"
          )

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            'Version: 2.0.2',
            "Libs: $fdkLib"
          )
          # SDL2 is required by ffplay; vcpkg does not always ship sdl2.pc
          $sdl2Lib = Find-ImportLib @('SDL2')
          if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
          $sdl2mainLib = Find-ImportLib @('SDL2main')
          $sdl2Libs = if ($sdl2mainLib) { "-lSDL2main -lSDL2" } else { "-lSDL2" }
          Write-Utf8 "$pcDir/sdl2.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: sdl2',
            'Description: Simple DirectMedia Layer',
            'Version: 2.30.0',
            "Libs: $sdl2Libs",
            'Cflags: -I${includedir} -I${includedir}/SDL2'
          )

          # vpl.pc — vcpkg libvpl uses cmake-config, ffmpeg needs pkg-config
          # oneVPL 2.x headers live under include/vpl/; include parent too for compat
          $vplLib = Find-ImportLib @('vpl','libvpl')
          if (-not $vplLib) { throw "vpl import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/vpl.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: vpl',
            'Description: Intel oneVPL Dispatcher',
            'Version: 2.16.0',
            "Libs: -lvpl",
            'Cflags: -I${includedir} -I${includedir}/vpl'
          )

          # Also create alternate import-library names so ffmpeg's non-pkg-config
          # fallbacks (-lmp3lame, -lfdk-aac, -lvpl) can find the files.
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $lameLib "mp3lame.lib"
          Ensure-LibAlias $lameLib "libmp3lame.lib"
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          Ensure-LibAlias $vplLib "vpl.lib"
          Ensure-LibAlias $vplLib "libvpl.lib"

          # pkg-config implementation from vcpkg (Git for Windows lacks it on this runner)
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "Installed import libraries:"
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          Write-Host "libmp3lame.pc:"
          Get-Content "$pcDir/libmp3lame.pc"
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"
          Write-Host "vpl.pc:"
          Get-Content "$pcDir/vpl.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check vcpkg pkg-config
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "libmp3lame NOT FOUND"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "libfdk-aac NOT FOUND"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "sdl2 NOT FOUND"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "vpl NOT FOUND"

      - name: Build VMAF (CPU)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # Patch VMAF for Clang + MSVC target: don't redefine __builtin_clz under Clang
          sed -i 's/^#ifdef _MSC_VER$/#if defined(_MSC_VER) \&\& !defined(__clang__)/' src/feature/integer_vif.h
          # Patch mkdirp.c/.h for Windows: unistd.h/sys/types.h are not available,
          # use direct.h and define mode_t; use _mkdir on Windows.
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c", "src/feature/cuda/integer_adm_cuda.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              p.write_text(s, encoding="utf-8")
              compat_dir = pathlib.Path("src/compat/msvc/common")
              compat_dir.mkdir(parents=True, exist_ok=True)
              (compat_dir / "attributes.h").write_text(
                  "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#endif\n"
              )
          '
          # Ensure MSVC link.exe before Git's link.EXE for meson
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # PThreads4W (installed via vcpkg) provides pthread.h on Windows
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "Using PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::pthread.h found but no pthread*.lib under ${VCPKG_INSTALLED}/lib"
              exit 1
            fi
          fi
          # VMAF asm needs nasm on x86/x64; gracefully disable if it is not available.
          if command -v nasm >/dev/null 2>&1 || command -v nasm.exe >/dev/null 2>&1; then
            VMAF_ENABLE_ASM=true
          else
            VMAF_ENABLE_ASM=false
            echo "::warning::nasm not found, disabling VMAF asm optimizations"
          fi
          # Helper: build a Meson array literal from positional args (handles spaces safely)
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          if [ -n "${CLANG_BIN:-}" ] && [ -f "${CLANG_BIN}/clang.exe" ]; then
            if [ "$VMAF_ENABLE_ASM" = "true" ]; then
              echo "Building VMAF with VS Clang (MSVC target) to keep AVX2 asm"
            else
              echo "Building VMAF with VS Clang (MSVC target) (nasm missing, disabling asm)"
            fi
            VMAF_C_ARGS=$(__meson_array "-MD" "--target=x86_64-pc-windows-msvc" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_CPP_ARGS=$(__meson_array "-MD" "--target=x86_64-pc-windows-msvc" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            CC="${CLANG_BIN}/clang.exe" CXX="${CLANG_BIN}/clang++.exe" \
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=${VMAF_ENABLE_ASM} -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dcpp_args="$VMAF_CPP_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS" \
              -Dcpp_link_args="$VMAF_LINK_ARGS"
          else
            echo "::warning::VS Clang not found, falling back to MSVC with -Denable_asm=false"
            VMAF_C_ARGS=$(__meson_array "-MD" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=false -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS"
          fi
          ninja -vC build

          # Manual install: build a static libvmaf on Windows/Clang to avoid DLL import-library issues.
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::VMAF static library not found under build/src"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -lucrt -lmsvcrt -lvcruntime -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: Dump VMAF meson log
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: Debug pkg-config (vpl)
        shell: bash
        run: |
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- pkg-config search path ---"
          $PKG_CONFIG --variable=pc_path pkg-config 2>/dev/null || true
          echo "--- vpl.pc ---"
          $PKG_CONFIG --exists vpl && echo "vpl found: $($PKG_CONFIG --modversion vpl)" || echo "vpl NOT FOUND"
          echo "--- vpl.pc details ---"
          $PKG_CONFIG --debug vpl 2>&1 | head -20 || true
          echo "--- vpl.pc file ---"
          find "${VCPKG_INSTALLED}" -name 'vpl.pc' 2>/dev/null || echo "(not found in vcpkg tree)"

      - name: Dump VMAF meson log
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: Build FFmpeg (MSVC)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          # Normalize pkg-config path so bash/ffmpeg configure can execute it reliably
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo NOT FOUND))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # Patch ffbuild/library.mak so lib.exe receives a Windows-absolute response file path.
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --extra-cflags="-MD -I$P_MIXED/include -I${VCPKG_INSTALLED}/include -I${VCPKG_INSTALLED}/include/vpl" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ucrt.lib msvcrt.lib vcruntime.lib advapi32.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libvpl \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Dump ffbuild/config.log on failure
        if: failure()
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: Copy DLLs
        shell: powershell
        run: |
          $src = "$env:VCPKG_INSTALLED\bin"
          $dst = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Get-ChildItem "$src\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $dst -Force
            Write-Host "  copied $($_.Name)"
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-intel-qsv.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-intel-qsv
          path: ffmpeg-windows-intel-qsv.zip
          retention-days: 30

  # ============================================================
  # macOS ARM (VideoToolbox + VMAF)
  # ============================================================
  macos-arm:
    name: macOS ARM (VideoToolbox)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install yasm nasm pkg-config meson ninja cmake wget lame fdk-aac sdl2

      - name: Build VMAF (CPU)
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          LAME_PREFIX="$(brew --prefix lame)"
          FDK_PREFIX="$(brew --prefix fdk-aac)"
          # Homebrew 的 lame 不带 .pc 文件，手动生成 libmp3lame.pc
          LAME_INCLUDE=$(ls -d "${LAME_PREFIX}/include"/*/ 2>/dev/null | head -1 || echo "${LAME_PREFIX}/include")
          {
            echo "prefix=${LAME_PREFIX}"
            echo 'exec_prefix=${prefix}'
            echo "libdir=${LAME_PREFIX}/lib"
            echo "includedir=${LAME_INCLUDE}"
            echo ""
            echo "Name: libmp3lame"
            echo "Description: LAME MP3 encoder library"
            echo "Version: 3.100"
            echo 'Libs: -L${libdir} -lmp3lame'
            echo 'Cflags: -I${includedir}'
          } > "${P}/lib/pkgconfig/libmp3lame.pc"
          # fdk-aac 有 .pc 但 ffmpeg 需要 libfdk-aac 名
          [ -f "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" ] && \
            ln -sf "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" "${P}/lib/pkgconfig/libfdk-aac.pc"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${LAME_PREFIX}/lib/pkgconfig:${FDK_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          pkg-config --exists libmp3lame && echo "pkg-config libmp3lame: OK ($(pkg-config --modversion libmp3lame))" || echo "pkg-config libmp3lame: FAIL"
          pkg-config --exists libfdk-aac  && echo "pkg-config libfdk-aac: OK ($(pkg-config --modversion libfdk-aac))"   || echo "pkg-config libfdk-aac: FAIL"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$P" \
            --extra-cflags="-I$P/include -I${LAME_PREFIX}/include -I${FDK_PREFIX}/include" \
            --extra-ldflags="-L$P/lib -L${LAME_PREFIX}/lib -L${FDK_PREFIX}/lib" \
            --extra-libs="-lpthread -lm" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libmp3lame --enable-libfdk-aac \
            --enable-sdl2 --enable-videotoolbox --enable-audiotoolbox \
            --enable-hwaccel=h264_videotoolbox --enable-hwaccel=hevc_videotoolbox \
            --enable-hwaccel=vp9_videotoolbox --enable-hwaccel=prores_videotoolbox \
            --enable-hwaccel=av1_videotoolbox --disable-doc
          make -j"$(sysctl -n hw.logicalcpu)" && make install

      - name: Dump config.log (on failure)
        if: failure()
        run: |
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== ffbuild/config.log (LAME section) ==="
          grep -A20 'libmp3lame' /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(no libmp3lame section)"

      - name: Strip, sign & verify
        run: |
          FF="${HOME}/ffmpeg-install/bin/ffmpeg"
          strip "${FF}" "${FF/%ffmpeg/ffprobe}" "${FF/%ffmpeg/ffplay}" 2>/dev/null || true
          for bin in ffmpeg ffprobe ffplay; do codesign --force --sign - "${HOME}/ffmpeg-install/bin/${bin}" 2>/dev/null || true; done
          "${FF}" -version 2>&1 | head -n5
          echo "--- HW Accel Methods ---"
          "${FF}" -hide_banner -hwaccels 2>&1 || echo "(none)"
          echo "--- VideoToolbox encoders ---"
          "${FF}" -hide_banner -encoders 2>&1 | grep -iE 'h264_videotoolbox|hevc_videotoolbox|prores_videotoolbox' || echo "(none)"
          echo "--- VT hwaccel decode support (via -hwaccel videotoolbox) ---"
          # Modern ffmpeg (6.0+) uses the hwaccel framework for VT decoding, not standalone decoder wrappers.
          # Each --enable-hwaccel=xxx_videotoolbox registers a codec backend under the unified 'videotoolbox' hwaccel.
          # Verify by checking that 'videotoolbox' is listed in -hwaccels AND that each hw-codec is recognized.
          echo "  hwaccel videotoolbox available: $("${FF}" -hide_banner -hwaccels 2>&1 | grep -q videotoolbox && echo YES || echo NO)"
          for c in h264 hevc vp9 prores av1; do
            echo "  hw-codec ${c}: $("${FF}" -hide_banner -hwaccel videotoolbox -codecs 2>&1 | grep -i "${c}" | head -1 || echo '(not listed)')"
          done
          echo "--- VMAF ---"
          "${FF}" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-macos-arm.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm
          path: ffmpeg-macos-arm.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS ARM64 — Snapdragon (Software Encoders + D3D11VA)
  # ============================================================
  windows-arm64:
    name: Windows ARM64 (Snapdragon)
    runs-on: windows-11-vs2026-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (VS 2026 ARM64)
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64_arm64, vsversion: "18.0" }

      - name: Install build tools
        shell: powershell
        run: |
          # Chocolatey pkgconfiglite is unreliable; use Git for Windows' pkg-config
          choco install -y --no-progress nasm make activeperl ninja
          pip install meson
          refreshenv
          # NASM may install under Program Files; expose it explicitly so bash ./configure can find it
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) {
            echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "nasm found at $nasmDir"
          } else {
            Write-Host "::warning::nasm.exe not found in expected locations"
          }
          # Ensure nasm is on PATH for bash steps.
          # pkg-config will be provided by vcpkg's pkgconf port (installed later).
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # Remove Strawberry Perl from PATH: its pkg-config is broken and its ccache
          # breaks meson. GITHUB_ENV propagates the cleaned PATH to subsequent steps.
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # Use VS-provided Clang for libvmaf if available.
          # Clang is used for libvmaf only; FFmpeg itself continues to use MSVC (cl.exe).
          # If no Clang is found, the Build VMAF step falls back to MSVC with -Denable_asm=false.
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          if ($clangDir) {
            Write-Host "VS Clang found at $clangDir"
            echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
            # Expose the VS Clang directory to bash steps so they can use an absolute
            # path and avoid picking up a different clang (e.g. from MinGW/LLVM) earlier
            # in PATH.
            $clangDirUnix = $clangDir -replace '\\','/'
            echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::warning::VS Clang not found; VMAF will fall back to MSVC with -Denable_asm=false"
          }

      - name: vcpkg deps
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          & "$v\vcpkg.exe" install --triplet arm64-windows pkgconf mp3lame fdk-aac sdl2 libiconv zlib pthreads
          $inst = "$v\installed\arm64-windows"
          # Convert to forward slashes so pkg-config (bash) can use the path
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              $p = Join-Path "$inst\lib" "$name.lib"
              if (Test-Path $p) { return "$name.lib" }
            }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }

          # vcpkg ports do not always ship pkg-config files; create the ones ffmpeg expects.
          $lameLib = Find-ImportLib @('mp3lame','libmp3lame')
          if (-not $lameLib) { throw "mp3lame import library not found under $inst\lib" }
          # For MSVC we already pass -I/-LIBPATH via --extra-cflags/--extra-ldflags,
          # so the .pc files only need to declare the library name. This avoids -L
          # flags that the MSVC linker may not handle during configure tests.
          Write-Utf8 "$pcDir/libmp3lame.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            "Libs: $lameLib"
          )

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            'Version: 2.0.2',
            "Libs: $fdkLib"
          )
          # SDL2 is required by ffplay; vcpkg does not always ship sdl2.pc
          $sdl2Lib = Find-ImportLib @('SDL2')
          if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
          $sdl2mainLib = Find-ImportLib @('SDL2main')
          $sdl2Libs = if ($sdl2mainLib) { "-lSDL2main -lSDL2" } else { "-lSDL2" }
          Write-Utf8 "$pcDir/sdl2.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: sdl2',
            'Description: Simple DirectMedia Layer',
            'Version: 2.30.0',
            "Libs: $sdl2Libs",
            'Cflags: -I${includedir} -I${includedir}/SDL2'
          )

          # Also create alternate import-library names so ffmpeg's non-pkg-config
          # fallbacks (-lmp3lame, -lfdk-aac) can find the files.
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $lameLib "mp3lame.lib"
          Ensure-LibAlias $lameLib "libmp3lame.lib"
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          if ($vplLib) {
            Ensure-LibAlias $vplLib "vpl.lib"
            Ensure-LibAlias $vplLib "libvpl.lib"
          }

          # pkg-config implementation from vcpkg (Git for Windows lacks it on this runner)
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "Installed import libraries:"
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          Write-Host "libmp3lame.pc:"
          Get-Content "$pcDir/libmp3lame.pc"
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check vcpkg pkg-config
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "libmp3lame NOT FOUND"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "libfdk-aac NOT FOUND"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "sdl2 NOT FOUND"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "vpl NOT FOUND"

      - name: Build VMAF (CPU)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # Ensure MSVC link.exe before Git's link.EXE for meson
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # Patch VMAF for Windows ARM64 MSVC: missing POSIX headers, ARM64 intrinsics,
          # and void* arithmetic which MSVC does not allow.
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c",
                       "src/feature/cuda/integer_adm_cuda.c", "src/feature/integer_vif.h",
                       "src/feature/integer_vif.c", "src/feature/integer_adm.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              s = s.replace(
                  "#ifdef _MSC_VER\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)__lzcnt(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)__lzcnt64(x);\n}\n\n#endif",
                  "#if defined(_MSC_VER) && defined(_M_ARM64)\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)_CountLeadingZeros(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)_CountLeadingZeros64(x);\n}\n\n#elif defined(_MSC_VER)\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)__lzcnt(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)__lzcnt64(x);\n}\n\n#endif"
              )
              s = s.replace(
                  "void *data = aligned_malloc(data_sz, MAX_ALIGN);",
                  "char *data = (char *)aligned_malloc(data_sz, MAX_ALIGN);"
              )
              s = s.replace(
                  "#include \"integer_adm.h\"",
                  "#include \"integer_adm.h\"\n\n#if defined(_MSC_VER) && defined(_M_ARM64)\n#include <intrin.h>\n#define __builtin_clz(x) _CountLeadingZeros(x)\n#endif"
              )
              p.write_text(s, encoding="utf-8")
          compat_dir = pathlib.Path("src/compat/msvc/common")
          compat_dir.mkdir(parents=True, exist_ok=True)
          (compat_dir / "attributes.h").write_text(
              "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
              "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
              "#endif\n"
          )
          '
          # MSVC C11 does not support C99 variable-length arrays; replace with _alloca.
          python3 -c '
          import pathlib
          for path in ("src/predict.c", "src/libvmaf.c", "src/read_json_model.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              if "#include <malloc.h>" not in s:
                  s = "#include <malloc.h>\n" + s
              s = s.replace("double scores[model_collection->cnt];", "double *scores = (double *)_alloca(sizeof(double) * model_collection->cnt);")
              s = s.replace("char name[name_sz];", "char *name = (char *)_alloca(name_sz);")
              s = s.replace("char cfg_name[cfg_name_sz];", "char *cfg_name = (char *)_alloca(cfg_name_sz);")
              s = s.replace("char generated_key[generated_key_sz];", "char generated_key[5];")
              p.write_text(s, encoding="utf-8")
          '
          # PThreads4W (installed via vcpkg) provides pthread.h on Windows
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "Using PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::pthread.h found but no pthread*.lib under ${VCPKG_INSTALLED}/lib"
              exit 1
            fi
          fi
          # Helper: build a Meson array literal from positional args (handles spaces safely)
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          VMAF_C_ARGS=$(__meson_array "-MD" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
          VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
          # ARM64: keep it simple with MSVC; NEON asm is different from x86 AVX2
          PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=false -Ddefault_library=static \
            -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
            -Dc_args="$VMAF_C_ARGS" \
            -Dc_link_args="$VMAF_LINK_ARGS"
          ninja -vC build

          # Manual install: build a static libvmaf on Windows/Clang to avoid DLL import-library issues.
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::VMAF static library not found under build/src"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -lucrt -lmsvcrt -lvcruntime -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: Dump VMAF meson log
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: Build FFmpeg (MSVC ARM64)
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          # Normalize pkg-config path so bash/ffmpeg configure can execute it reliably
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo NOT FOUND))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # Patch ffbuild/library.mak so lib.exe receives a Windows-absolute response file path.
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --extra-cflags="-MD -I$P_MIXED/include -I${VCPKG_INSTALLED}/include" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ucrt.lib msvcrt.lib vcruntime.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libmp3lame --enable-libfdk-aac \
            --enable-sdl2 --enable-d3d11va --enable-dxva2 --enable-mediafoundation \
            --disable-doc
          make -j"$(nproc)" && make install

      - name: Dump ffbuild/config.log on failure
        if: failure()
        shell: bash
        run: |
          # Remove Strawberry paths that ship broken pkg-config / ccache
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG is not set"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: Copy DLLs
        shell: powershell
        run: |
          $src = "$env:VCPKG_INSTALLED\bin"
          $dst = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Get-ChildItem "$src\*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $dst -Force
            Write-Host "  copied $($_.Name)"
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- HW Accel ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -hwaccels 2>&1 || echo "(none)"
          echo "--- Decoders (hw) ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -decoders 2>&1 | grep -iE '_d3d11va|_dxva2|_mf' | head -10 || echo "(none)"
          echo "--- Encoders ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep -iE 'libmp3lame|libfdk_aac|_mf' || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-arm64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-arm64
          path: ffmpeg-windows-arm64.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: Create GitHub Release
    needs:
      - linux-nvidia
      - linux-intel-qsv
      - linux-amd
      - windows-nvidia
      - windows-amd-amf
      - windows-intel-qsv
      - windows-arm64
      - macos-arm
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FFmpeg ${{ github.ref_name }}
          body: |
            ## 🎬 FFmpeg Multi-Vendor Build

            Each archive contains **ffmpeg + ffprobe + ffplay** with vendor-specific hardware acceleration.

            ### 📦 Linux (x86_64)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-linux-nvidia.tar.xz` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-linux-intel-qsv.tar.xz` | Intel | QSV (oneVPL) + VAAPI | ✅ CPU |
            | `ffmpeg-linux-amd.tar.xz` | AMD | VAAPI | ✅ CPU |

            ### 📦 Windows (x86_64, MSVC)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-windows-nvidia.zip` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-windows-amd-amf.zip` | AMD | AMF | ✅ CPU |
            | `ffmpeg-windows-intel-qsv.zip` | Intel | QSV (oneVPL) | ✅ CPU |

            ### 📦 Windows (ARM64, MSVC)

            | Artifact | CPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-windows-arm64.zip` | Snapdragon X | D3D11VA / DXVA2 / MF | ✅ CPU |

            ### 📦 macOS (ARM64)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-macos-arm.tar.xz` | Apple | VideoToolbox | ✅ CPU |

            > All builds include: libmp3lame + libfdk-aac + SDL2 (ffplay)
            > Windows builds compiled with MSVC 2026, requires VC++ Redistributable.
          files: release-assets/*
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          fail_on_unmatched_files: true
