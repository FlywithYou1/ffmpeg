            --extra-cflags="-I$P/include -I${VCPKG_INSTALLED}/include" \
            --extra-ldflags="-LIBPATH:$P/lib -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libvpl \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Copy DLLs
        shell: powershell
        run: |
          $dlls = @("libmp3lame.dll","fdk-aac-2.dll","SDL2.dll","zlib1.dll","libvpl.dll")
          foreach ($d in $dlls) {
            $s = Join-Path "$env:VCPKG_INSTALLED\bin" $d
            if (Test-Path $s) { Copy-Item $s "$env:USERPROFILE\ffmpeg-install\bin\" -Force }
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-intel-qsv.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-intel-qsv
          path: ffmpeg-windows-intel-qsv.zip
          retention-days: 30

  # ============================================================
  # macOS ARM (VideoToolbox + VMAF)
  # ============================================================
  macos-arm:
    name: macOS ARM (VideoToolbox)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install yasm nasm pkg-config meson ninja cmake wget lame fdk-aac sdl2

      - name: Build VMAF (CPU)
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          LAME_PREFIX="$(brew --prefix lame)"
          FDK_PREFIX="$(brew --prefix fdk-aac)"
          # Homebrew 的 lame/fdk-aac 是 keg-only，提供 lame.pc / fdk-aac.pc，
          # 但 ffmpeg 需要 libmp3lame.pc / libfdk-aac.pc
          [ -f "${LAME_PREFIX}/lib/pkgconfig/lame.pc" ] && \
            ln -sf "${LAME_PREFIX}/lib/pkgconfig/lame.pc" "${P}/lib/pkgconfig/libmp3lame.pc"
          [ -f "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" ] && \
            ln -sf "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" "${P}/lib/pkgconfig/libfdk-aac.pc"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${LAME_PREFIX}/lib/pkgconfig:${FDK_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$P" \
            --extra-cflags="-I$P/include" \
            --extra-ldflags="-L$P/lib" \
            --extra-libs="-lpthread -lm" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libmp3lame --enable-libfdk-aac \
            --enable-sdl2 --enable-videotoolbox --enable-audiotoolbox \
            --enable-hwaccel=h264_videotoolbox --enable-hwaccel=hevc_videotoolbox \
            --enable-hwaccel=vp9_videotoolbox --enable-hwaccel=prores_videotoolbox \
            --enable-hwaccel=av1_videotoolbox --disable-doc
          make -j"$(sysctl -n hw.logicalcpu)" && make install

      - name: Strip, sign & verify
        run: |
          strip "${HOME}/ffmpeg-install/bin/ffmpeg" "${HOME}/ffmpeg-install/bin/ffprobe" "${HOME}/ffmpeg-install/bin/ffplay" 2>/dev/null || true
          for bin in ffmpeg ffprobe ffplay; do codesign --force --sign - "${HOME}/ffmpeg-install/bin/${bin}" 2>/dev/null || true; done
          "${HOME}/ffmpeg-install/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- VideoToolbox encoders ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep -iE 'h264_videotoolbox|hevc_videotoolbox|prores_videotoolbox' || echo "(none)"
          echo "--- VideoToolbox decoders ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -decoders 2>&1 | grep -i videotoolbox || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-macos-arm.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm
          path: ffmpeg-macos-arm.tar.xz
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: Create GitHub Release
    needs:
      - linux-nvidia
      - linux-intel-qsv
      - windows-nvidia
      - windows-amd-amf
      - windows-intel-qsv
      - macos-arm
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FFmpeg ${{ github.ref_name }}
          body: |
            ## 🎬 FFmpeg Multi-Vendor Build

            Each archive contains **ffmpeg + ffprobe + ffplay** with vendor-specific hardware acceleration.

            ### 📦 Linux (x86_64)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-linux-nvidia.tar.xz` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-linux-intel-qsv.tar.xz` | Intel | QSV (oneVPL) + VAAPI | ✅ CPU |

            ### 📦 Windows (x86_64, MSVC)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-windows-nvidia.zip` | NVIDIA | NVENC/CUDA | ✅ CUDA |
            | `ffmpeg-windows-amd-amf.zip` | AMD | AMF | ✅ CPU |
            | `ffmpeg-windows-intel-qsv.zip` | Intel | QSV (oneVPL) | ✅ CPU |

            ### 📦 macOS (ARM64)

            | Artifact | GPU | HW Accel | VMAF |
            |---|---|---|---|
            | `ffmpeg-macos-arm.tar.xz` | Apple | VideoToolbox | ✅ CPU |

            > All builds include: libmp3lame + libfdk-aac + SDL2 (ffplay)
            > Windows builds compiled with MSVC 2026, requires VC++ Redistributable.
          files: release-assets/*
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          fail_on_unmatched_files: true
