          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- AMF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep '_amf' | head -10 || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-amd-amf.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-amd-amf
          path: ffmpeg-windows-amd-amf.zip
          retention-days: 30

