          path: ffmpeg-linux-amd.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS — NVIDIA (NVENC/CUDA + VMAF-CUDA)
  # ============================================================
  windows-nvidia:
    name: Windows (NVIDIA NVENC/CUDA)
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (VS 2026)
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64 }

      - name: Install build tools
        shell: powershell
        run: |
          choco install -y --no-progress nasm pkgconfiglite make activeperl
          refreshenv

      - name: vcpkg deps
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          & "$v\vcpkg.exe" install --triplet x64-windows mp3lame fdk-aac sdl2 libiconv zlib
          $inst = "$v\installed\x64-windows"
          # vcpkg's mp3lame port does not ship a pkg-config file; create one for ffmpeg
          $pcDir = "$inst\lib\pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null
          $pcMixed = $inst -replace '\\','/'
          @(
            "prefix=$pcMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            'Libs: -L${libdir} libmp3lame.lib',
            'Cflags: -I${includedir}'
          ) | Set-Content -Encoding utf8 "$pcDir\libmp3lame.pc"
          echo "VCPKG_INSTALLED=$inst" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Detect CUDA
        shell: bash
        run: |
          CUDA_BASE=""
          for d in "/c/Program Files/NVIDIA GPU Computing Toolkit/CUDA"/v*; do
            d2="$(cygpath -u "$d" 2>/dev/null || echo "$d")"
            if [ -d "${d2}/bin" ] && [ -f "${d2}/bin/nvcc.exe" ]; then CUDA_BASE="${d2}"; break; fi
          done
          [ -z "${CUDA_BASE}" ] && { echo "::error::CUDA not found"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc.exe" --version

      - name: Build nv-codec-headers
        shell: bash
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX="$P" && make PREFIX="$P" install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build VMAF-CUDA (MSVC)
        shell: bash
        run: |
          set -e; P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          export CUDA_PATH="${CUDA_HOME}" CUDACXX="${CUDA_HOME}/bin/nvcc"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          export C_INCLUDE_PATH="$P/include:${CUDA_HOME}/include:${C_INCLUDE_PATH:-}"
          CL="${CUDA_HOME}/lib/x64"; [ ! -d "$CL" ] && CL="${CUDA_HOME}/lib"
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=true
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build FFmpeg (MSVC)
        shell: bash
        run: |
          set -e; P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          CL="${CUDA_HOME}/lib/x64"; [ ! -d "$CL" ] && CL="${CUDA_HOME}/lib"
          ./configure --toolchain=msvc --prefix="$P" \
            --extra-cflags="-I$P/include -I${CUDA_HOME}/include -I${VCPKG_INSTALLED}/include" \
            --extra-ldflags="-LIBPATH:$P/lib -LIBPATH:$CL -LIBPATH:${VCPKG_INSTALLED}/lib" \
            --extra-libs="ole32.lib ws2_32.lib user32.lib bcrypt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc \
            --enable-cuvid --enable-nvenc --disable-libnpp \
            --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: Copy DLLs
        shell: powershell
        run: |
          $dlls = @("libmp3lame.dll","fdk-aac-2.dll","SDL2.dll","zlib1.dll")
          foreach ($d in $dlls) {
            $s = Join-Path "$env:VCPKG_INSTALLED\bin" $d
            if (Test-Path $s) { Copy-Item $s "$env:USERPROFILE\ffmpeg-install\bin\" -Force }
          }

      - name: Verify
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- NVENC ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc' || echo "(none)"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "(none)"

      - name: Package
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe","$b\*.dll" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-nvidia.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-nvidia
          path: ffmpeg-windows-nvidia.zip
          retention-days: 30

