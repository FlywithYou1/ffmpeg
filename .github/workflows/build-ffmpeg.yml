                "Libs: $libopenmptLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libopenmpt.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libopenmpt.pc"
            }
          } else {
            Write-Host "::warning::未找到 libopenmpt 导入库；跳过 .pc"
          }

          # vpl.pc — vcpkg libvpl 使用 cmake-config，ffmpeg 需要 pkg-config
          # oneVPL 2.x 头文件位于 include/vpl/ 下；为兼容性同时包含父目录
          $vplLib = Find-ImportLib @('vpl','libvpl')
          if (-not $vplLib) { throw "vpl import library not found under $inst\lib" }
          $vplVer = Get-PortVersion 'libvpl'
          if (-not $vplVer -or $vplVer -eq 'unknown') { $vplVer = '2.14.0' }
          Remove-Item "$pcDir/vpl.pc" -ErrorAction SilentlyContinue
          Write-Utf8 "$pcDir/vpl.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            "libdir=$instMixed/lib",
            "includedir=$instMixed/include",
            '',
            'Name: vpl',
            'Description: Intel oneVPL Dispatcher',
            "Version: $vplVer",
            "Libs: $instMixed/lib/vpl.lib",
            "Cflags: -I$instMixed/include -I$instMixed/include/vpl"
          )

          # 同时创建备用导入库名称，以便 ffmpeg 的非 pkg-config
          # 回退（-lmp3lame、-lfdk-aac、-lvpl）能找到文件。
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          Ensure-LibAlias $vplLib "vpl.lib"
          Ensure-LibAlias $vplLib "libvpl.lib"


          # Alternate import-library names for ffmpeg linker fallbacks.
          if ($libx264Lib) { Ensure-LibAlias $libx264Lib "libx264.lib" }
          if ($libx264Lib) { Ensure-LibAlias $libx264Lib "x264.lib" }
          if ($libx265Lib) { Ensure-LibAlias $libx265Lib "libx265.lib" }
          if ($libx265Lib) { Ensure-LibAlias $libx265Lib "x265.lib" }
          if ($libvpxLib) { Ensure-LibAlias $libvpxLib "libvpx.lib" }
          if ($libvpxLib) { Ensure-LibAlias $libvpxLib "vpx.lib" }
          if ($opusLib) { Ensure-LibAlias $opusLib "opus.lib" }
          if ($vorbisLib) { Ensure-LibAlias $vorbisLib "vorbis.lib" }
          if ($vorbisencLib) { Ensure-LibAlias $vorbisencLib "vorbisenc.lib" }
          if ($theoraLib) { Ensure-LibAlias $theoraLib "theora.lib" }
          if ($theoradecLib) { Ensure-LibAlias $theoradecLib "theoradec.lib" }
          if ($theoraencLib) { Ensure-LibAlias $theoraencLib "theoraenc.lib" }
          if ($libaomLib) { Ensure-LibAlias $libaomLib "libaom.lib" }
          if ($libaomLib) { Ensure-LibAlias $libaomLib "aom.lib" }
          if ($libwebpLib) { Ensure-LibAlias $libwebpLib "libwebp.lib" }
          if ($libwebpLib) { Ensure-LibAlias $libwebpLib "webp.lib" }
          if ($libassLib) { Ensure-LibAlias $libassLib "libass.lib" }
          if ($libassLib) { Ensure-LibAlias $libassLib "ass.lib" }
          if ($freetype2Lib) { Ensure-LibAlias $freetype2Lib "freetype.lib" }
          if ($fontconfigLib) { Ensure-LibAlias $fontconfigLib "fontconfig.lib" }
          if ($zimgLib) { Ensure-LibAlias $zimgLib "zimg.lib" }
          if ($soxrLib) { Ensure-LibAlias $soxrLib "soxr.lib" }
          if ($libopenjp2Lib) { Ensure-LibAlias $libopenjp2Lib "libopenjp2.lib" }
          if ($libopenjp2Lib) { Ensure-LibAlias $libopenjp2Lib "openjp2.lib" }
          if ($snappyLib) { Ensure-LibAlias $snappyLib "snappy.lib" }
          if ($libtwolameLib) { Ensure-LibAlias $libtwolameLib "libtwolame.lib" }
          if ($libtwolameLib) { Ensure-LibAlias $libtwolameLib "twolame.lib" }
          if ($libopenmptLib) { Ensure-LibAlias $libopenmptLib "libopenmpt.lib" }
          if ($libopenmptLib) { Ensure-LibAlias $libopenmptLib "openmpt.lib" }
          # 来自 vcpkg 的 pkg-config 实现（此运行器上的 Git for Windows 缺少它）
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "已安装的导入库："
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          if ($env:LAME_PKG_CONFIG_PATH -and (Test-Path "$env:LAME_PKG_CONFIG_PATH/libmp3lame.pc")) {
            Write-Host "libmp3lame.pc:"
            Get-Content "$env:LAME_PKG_CONFIG_PATH/libmp3lame.pc"
          }
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"
          Write-Host "vpl.pc:"
          Get-Content "$pcDir/vpl.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $lamePc = $env:LAME_PKG_CONFIG_PATH
          $pkgConfigPath = if ($lamePc) { "$pcDir;$lamePc" } else { $pcDir }
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $shadercTools = "$inst\tools\shaderc"
          if (Test-Path "$shadercTools\glslc.exe") { echo "$shadercTools" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append; Write-Host "shaderc tools: $shadercTools" }

      - name: 从源码编译 zimg
        shell: powershell
        run: |
          $zimgRoot = "$env:TEMP\zimg-src"
          Remove-Item -Recurse -Force $zimgRoot -ErrorAction SilentlyContinue
          git clone --depth 1 --recurse-submodules https://github.com/sekrit-twc/zimg.git $zimgRoot
          cd $zimgRoot
          $ver = (Select-String -Path "$zimgRoot\configure.ac" -Pattern 'AC_INIT\(\[zimg\], \[([^\]]+)\]').Matches.Groups[1].Value
          if (-not $ver) { $ver = '3.0.6' }
          $plat = if ($env:VSCMD_ARG_TGT_ARCH -eq 'arm64' -or $env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'ARM64' } else { 'x64' }
          # 强制 zimg 使用静态运行时 (/MT)，与 FFmpeg/vcpkg x64-windows-static 保持一致
          $props = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
            '  <PropertyGroup>',
            '    <WholeProgramOptimization>false</WholeProgramOptimization>',
            '  </PropertyGroup>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '      <WholeProgramOptimization>false</WholeProgramOptimization>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )
          [System.IO.File]::WriteAllLines("$zimgRoot\_msvc\Directory.Build.props", $props, [System.Text.UTF8Encoding]::new($false))
          msbuild "$zimgRoot\_msvc\zimg.sln" /p:Configuration=Release /p:Platform=$plat /t:zimg /p:PlatformToolset=v145 /p:WindowsTargetPlatformVersion=10.0 /p:WholeProgramOptimization=false /m
          $lib = Get-ChildItem "$zimgRoot\_msvc" -Recurse -Filter "z.lib" | Select-Object -First 1
          if (-not $lib) { throw "z.lib not found after building zimg" }
          $prefix = $env:VCPKG_INSTALLED
          New-Item -ItemType Directory -Path "$prefix\include", "$prefix\lib", "$prefix\lib\pkgconfig" -Force | Out-Null
          Copy-Item "$zimgRoot\src\zimg\api\zimg.h" "$prefix\include\zimg.h" -Force
          if (Test-Path "$zimgRoot\src\zimg\api\zimg++.hpp") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.hpp" "$prefix\include\zimg++.hpp" -Force
          } elseif (Test-Path "$zimgRoot\src\zimg\api\zimg++.h") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.h" "$prefix\include\zimg++.h" -Force
          }
          Copy-Item $lib.FullName "$prefix\lib\z.lib" -Force
          Copy-Item $lib.FullName "$prefix\lib\zimg.lib" -Force
          $pcMixed = ($prefix -replace '\\','/')
          $pc = @(
            "prefix=$pcMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: zimg',
            'Description: z.lib image processing library',
            "Version: $ver",
            'Libs: ${libdir}/zimg.lib',
            'Cflags: -I${includedir}'
          )
          [System.IO.File]::WriteAllLines("$prefix\lib\pkgconfig\zimg.pc", $pc, [System.Text.UTF8Encoding]::new($false))
          Write-Host "zimg $ver built for $plat"

      - name: 检查 vcpkg pkg-config
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "未找到 libmp3lame"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "未找到 libfdk-aac"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "未找到 sdl2"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "未找到 vpl"
          $PKG_CONFIG --exists zimg && echo "zimg OK: version=$($PKG_CONFIG --modversion zimg) libs=$($PKG_CONFIG --libs zimg) cflags=$($PKG_CONFIG --cflags zimg)" || echo "未找到 zimg"

      - name: 编译 VMAF（CPU）
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # 为 Clang + MSVC 目标修补 VMAF：不要在 Clang 下重新定义 __builtin_clz
          sed -i 's/^#ifdef _MSC_VER$/#if defined(_MSC_VER) \&\& !defined(__clang__)/' src/feature/integer_vif.h
          # 为 Windows 修补 mkdirp.c/.h：unistd.h/sys/types.h 不可用，
          # 使用 direct.h 并定义 mode_t；在 Windows 上使用 _mkdir。
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c", "src/feature/cuda/integer_adm_cuda.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              p.write_text(s, encoding="utf-8")
              compat_dir = pathlib.Path("src/compat/msvc/common")
              compat_dir.mkdir(parents=True, exist_ok=True)
              (compat_dir / "attributes.h").write_text(
                  "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
                  "#endif\n"
              )
          '
          # 确保 MSVC link.exe 排在 Git 的 link.EXE 之前供 meson 使用
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # PThreads4W（通过 vcpkg 安装）在 Windows 上提供 pthread.h
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "使用 PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::找到 pthread.h，但在 ${VCPKG_INSTALLED}/lib 下没有 pthread*.lib"
              exit 1
            fi
          fi
          # VMAF 汇编需要 x86/x64 上的 nasm；如果不可用则优雅禁用。
          if command -v nasm >/dev/null 2>&1 || command -v nasm.exe >/dev/null 2>&1; then
            VMAF_ENABLE_ASM=true
          else
            VMAF_ENABLE_ASM=false
            echo "::warning::未找到 nasm，禁用 VMAF 汇编优化"
          fi
          # 辅助函数：从位置参数构建 Meson 数组字面量（安全处理空格）
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          if [ -n "${CLANG_BIN:-}" ] && [ -f "${CLANG_BIN}/clang.exe" ]; then
            if [ "$VMAF_ENABLE_ASM" = "true" ]; then
              echo "使用 VS Clang（MSVC 目标）编译 VMAF 以保留 AVX2 汇编"
            else
              echo "使用 VS Clang（MSVC 目标）编译 VMAF（未找到 nasm，禁用汇编）"
            fi
            VMAF_C_ARGS=$(__meson_array "--target=x86_64-pc-windows-msvc" "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_CPP_ARGS=$(__meson_array "--target=x86_64-pc-windows-msvc" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            CC="${CLANG_BIN}/clang.exe" CXX="${CLANG_BIN}/clang++.exe" \
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=${VMAF_ENABLE_ASM} -Db_vscrt=mt -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dcpp_args="$VMAF_CPP_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS" \
              -Dcpp_link_args="$VMAF_LINK_ARGS"
          else
            echo "::warning::未找到 VS Clang，回退到 MSVC 并设置 -Denable_asm=false"
            VMAF_C_ARGS=$(__meson_array "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
            VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
            PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
            meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=false -Db_vscrt=mt -Ddefault_library=static \
              -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
              -Dc_args="$VMAF_C_ARGS" \
              -Dc_link_args="$VMAF_LINK_ARGS"
          fi
          ninja -vC build

          # 手动安装：在 Windows/Clang 上构建静态 libvmaf，以避免 DLL 导入库问题。
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::在 build/src 下未找到 VMAF 静态库"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: 导出 VMAF meson 日志
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: 调试 pkg-config（vpl）
        shell: bash
        run: |
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- pkg-config search path ---"
          $PKG_CONFIG --variable=pc_path pkg-config 2>/dev/null || true
          echo "--- vpl.pc ---"
          $PKG_CONFIG --exists vpl && echo "vpl found: $($PKG_CONFIG --modversion vpl)" || echo "未找到 vpl"
          echo "--- vpl.pc details ---"
          $PKG_CONFIG --debug vpl 2>&1 | head -20 || true
          echo "--- vpl.pc file ---"
          find "${VCPKG_INSTALLED}" -name 'vpl.pc' 2>/dev/null || echo "(not found in vcpkg tree)"

      - name: 导出 VMAF meson 日志
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: 编译 FFmpeg (MSVC)
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          # 规范化 pkg-config 路径，以便 bash/ffmpeg configure 能可靠执行
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo 未找到))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # 修补 ffbuild/library.mak，使 lib.exe 接收 Windows 绝对路径的响应文件。
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          # libsnappy 的 configure 检测在 MSVC 下多传了 -lstdc++，导致链接失败；去掉它。
          sed -i 's/require libsnappy snappy-c.h snappy_compress -lsnappy -lstdc++/require libsnappy snappy-c.h snappy_compress -lsnappy/' configure
          ./configure --toolchain=msvc --prefix="$P" \
            --pkg-config="$PKG_CONFIG" \
            --pkg-config-flags="--static" \
            --extra-cflags="-I$P_MIXED/include -I${VCPKG_INSTALLED}/include -I${VCPKG_INSTALLED}/include/vpl -I${LAME_PREFIX}/include" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:${VCPKG_INSTALLED}/lib -LIBPATH:${LAME_PREFIX}/lib" \
            --extra-libs="advapi32.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib cfgmgr32.lib gdi32.lib shell32.lib libcpmt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libvpl --enable-opencl --enable-vulkan \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libsvtav1 --enable-libdav1d --enable-libopenh264 --enable-libtwolame --enable-libspeex --enable-libjxl --enable-libopenmpt --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --enable-d3d11va --enable-d3d12va --enable-dxva2 --enable-mediafoundation --disable-doc
          make -j"$(nproc)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: 验证
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- QSV ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "（无）"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-intel-qsv.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-intel-qsv
          path: ffmpeg-windows-intel-qsv.zip
          retention-days: 30

  # ============================================================
  # macOS ARM（VideoToolbox + VMAF）
  # ============================================================
  macos-arm:
    name: macOS ARM（VideoToolbox）
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install yasm nasm pkg-config meson ninja cmake wget lame fdk-aac sdl2 x264 x265 libvpx opus libvorbis theora aom webp libass freetype fontconfig zimg libsoxr openjpeg snappy molten-vk shaderc svt-av1 dav1d kvazaar openh264 xvid twolame speex codec2 jpeg-xl libopenmpt libbs2b aribb24 libplacebo rubberband libvidstab

      - name: 编译 VMAF（CPU）
        run: |
          P="${HOME}/ffmpeg-install"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          PKG_CONFIG_PATH="$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false
          ninja -vC build && ninja -C build install
          echo "PKG_CONFIG_PATH=$P/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"

      - name: 编译 FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          LAME_PREFIX="$(brew --prefix lame)"
          FDK_PREFIX="$(brew --prefix fdk-aac)"
          # Homebrew 的 lame 不带 .pc 文件，手动生成 libmp3lame.pc
          LAME_INCLUDE=$(ls -d "${LAME_PREFIX}/include"/*/ 2>/dev/null | head -1 || echo "${LAME_PREFIX}/include")
          {
            echo "prefix=${LAME_PREFIX}"
            echo 'exec_prefix=${prefix}'
            echo "libdir=${LAME_PREFIX}/lib"
            echo "includedir=${LAME_INCLUDE}"
            echo ""
            echo "Name: libmp3lame"
            echo "Description: LAME MP3 encoder library"
            echo "Version: 3.100"
            echo 'Libs: -L${libdir} -lmp3lame'
            echo 'Cflags: -I${includedir}'
          } > "${P}/lib/pkgconfig/libmp3lame.pc"
          # fdk-aac 有 .pc 但 ffmpeg 需要 libfdk-aac 名
          [ -f "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" ] && ln -sf "${FDK_PREFIX}/lib/pkgconfig/fdk-aac.pc" "${P}/lib/pkgconfig/libfdk-aac.pc"
          BREW_PREFIX="$(brew --prefix)"
          MVK_PREFIX="$(brew --prefix molten-vk 2>/dev/null || true)"
          if [ -d "${MVK_PREFIX}/libexec/include" ]; then
            MVK_CFLAGS="-I${MVK_PREFIX}/libexec/include"
            MVK_LDFLAGS="-L${MVK_PREFIX}/lib -Wl,-rpath,${MVK_PREFIX}/lib"
          else
            MVK_CFLAGS=""
            MVK_LDFLAGS=""
          fi
          # 复制并修复 Homebrew 的 .pc（macOS 没有 libstdc++）
          for pc_dir in "${BREW_PREFIX}/lib/pkgconfig" /opt/homebrew/opt/*/lib/pkgconfig; do
            [ -d "$pc_dir" ] || continue
            for pc in "$pc_dir"/*.pc; do
              [ -f "$pc" ] || continue
              base=$(basename "$pc")
              sed 's/-lstdc++/-lc++/g' "$pc" > "${P}/lib/pkgconfig/$base"
            done
          done
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:${LAME_PREFIX}/lib/pkgconfig:${FDK_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          pkg-config --exists libmp3lame && echo "pkg-config libmp3lame: OK ($(pkg-config --modversion libmp3lame))" || echo "pkg-config libmp3lame: FAIL"
          pkg-config --exists libfdk-aac  && echo "pkg-config libfdk-aac: OK ($(pkg-config --modversion libfdk-aac))"   || echo "pkg-config libfdk-aac: FAIL"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          # macOS 使用 libc++，configure 里 libsnappy 的 -lstdc++ 会导致检测失败
          sed -i.bak 's/require libsnappy snappy-c.h snappy_compress -lsnappy -lstdc++/require libsnappy snappy-c.h snappy_compress -lsnappy/' configure
          rm -f configure.bak
          ./configure --prefix="$P" \
            --extra-cflags="-I$P/include -I${BREW_PREFIX}/include -I${LAME_PREFIX}/include -I${FDK_PREFIX}/include ${MVK_CFLAGS}" \
            --extra-ldflags="-L$P/lib -L${BREW_PREFIX}/lib -L${LAME_PREFIX}/lib -L${FDK_PREFIX}/lib ${MVK_LDFLAGS}" \
            --extra-libs="-lpthread -lm" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libmp3lame --enable-libfdk-aac --enable-opencl --enable-vulkan \
            --enable-libsvtav1 --enable-libdav1d --enable-libkvazaar --enable-libopenh264 --enable-libxvid --enable-libtwolame --enable-libspeex --enable-libcodec2 --enable-libjxl --enable-libopenmpt --enable-libbs2b --enable-libaribb24 --enable-libplacebo --enable-librubberband --enable-libvidstab \
            --enable-sdl2 --enable-videotoolbox --enable-audiotoolbox \
            --enable-hwaccel=h264_videotoolbox --enable-hwaccel=hevc_videotoolbox \
            --enable-hwaccel=vp9_videotoolbox --enable-hwaccel=prores_videotoolbox \
            --enable-hwaccel=av1_videotoolbox --disable-doc
          make -j"$(sysctl -n hw.logicalcpu)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        run: |
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== ffbuild/config.log (LAME section) ==="
          grep -A20 'libmp3lame' /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(no libmp3lame section)"

      - name: 裁剪、签名与验证
        run: |
          FF="${HOME}/ffmpeg-install/bin/ffmpeg"
          strip "${FF}" "${FF/%ffmpeg/ffprobe}" "${FF/%ffmpeg/ffplay}" 2>/dev/null || true
          for bin in ffmpeg ffprobe ffplay; do codesign --force --sign - "${HOME}/ffmpeg-install/bin/${bin}" 2>/dev/null || true; done
          "${FF}" -version 2>&1 | head -n5
          echo "--- HW Accel Methods ---"
          "${FF}" -hide_banner -hwaccels 2>&1 || echo "（无）"
          echo "--- VideoToolbox encoders ---"
          "${FF}" -hide_banner -encoders 2>&1 | grep -iE 'h264_videotoolbox|hevc_videotoolbox|prores_videotoolbox' || echo "（无）"
          echo "--- VT hwaccel decode support (via -hwaccel videotoolbox) ---"
          # Modern ffmpeg (6.0+) uses the hwaccel framework for VT decoding, not standalone decoder wrappers.
          # Each --enable-hwaccel=xxx_videotoolbox registers a codec backend under the unified 'videotoolbox' hwaccel.
          # Verify by checking that 'videotoolbox' is listed in -hwaccels AND that each hw-codec is recognized.
          echo "  hwaccel videotoolbox available: $("${FF}" -hide_banner -hwaccels 2>&1 | grep -q videotoolbox && echo YES || echo NO)"
          for c in h264 hevc vp9 prores av1; do
            echo "  hw-codec ${c}: $("${FF}" -hide_banner -hwaccel videotoolbox -codecs 2>&1 | grep -i "${c}" | head -1 || echo '(not listed)')"
          done
          echo "--- VMAF ---"
          "${FF}" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-macos-arm.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm
          path: ffmpeg-macos-arm.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS ARM64 — Snapdragon (Software Encoders + D3D11VA)
  # ============================================================
  windows-arm64:
    name: Windows ARM64（Snapdragon）
    runs-on: windows-11-vs2026-arm
    permissions:
      packages: write
    env:
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    steps:
      - uses: actions/checkout@v4

      - name: 配置 MSVC（VS 2026 ARM64）
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64_arm64, vsversion: "18.0" }

      - name: 安装构建工具
        shell: powershell
        run: |
          # Chocolatey pkgconfiglite is unreliable; use Git for Windows' pkg-config
          choco install -y --no-progress nasm make ninja
          pip install meson
          refreshenv
          # NASM 可能安装在 Program Files 下，显式暴露以便 bash ./configure 能找到
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) { echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append; Write-Host "nasm: $nasmDir" }
          if (-not $nasmDir) { Write-Host "::warning::nasm.exe not found" }
          # 确保 nasm 在 bash 步骤的 PATH 中。
          # pkg-config 将由 vcpkg 的 pkgconf 端口提供（稍后安装）。
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # 从 PATH 中移除 Strawberry Perl：它的 pkg-config 已损坏，且其 ccache
          # 会破坏 meson。GITHUB_ENV 将清理后的 PATH 传播到后续步骤。
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # 如果可用，使用 VS 提供的 Clang 编译 libvmaf。
          # Clang 仅用于 libvmaf；FFmpeg 本身继续使用 MSVC（cl.exe）。
          # 如果未找到 Clang，编译 VMAF 步骤将回退到 MSVC 并设置 -Denable_asm=false。
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          $clangDirUnix = $clangDir -replace '\\','/'
          if ($clangDir) { Write-Host "VS Clang: $clangDir" }
          if ($clangDir) { echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append }
          if ($clangDirUnix) { echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append }
          if (-not $clangDir) { Write-Host "::warning::VS Clang not found" }

      - name: 编译 libmp3lame（静态）
        shell: powershell
        run: |
          $lamePrefix = "$env:USERPROFILE\lame-install"
          $lamePrefixMixed = $lamePrefix -replace '\\','/'
          New-Item -ItemType Directory -Path "$lamePrefix\include\lame", "$lamePrefix\lib", "$lamePrefix\lib\pkgconfig" -Force | Out-Null

          cd "$env:TEMP"
          Remove-Item -Recurse -Force lame-src -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/TimothyGu/lame.git lame-src
          if ($LASTEXITCODE -ne 0) { throw "Failed to clone LAME source" }
          cd lame-src

          if (Test-Path configMS.h) {
            Copy-Item configMS.h config.h -Force
            Write-Host "使用 configMS.h 作为 config.h"
          }
          elseif (Test-Path vc_solution\config.h) {
            Copy-Item vc_solution\config.h config.h -Force
            Write-Host "使用 vc_solution\config.h"
          }
          else {
            Write-Host "创建最小 config.h"
            $configH = "#ifndef LAME_CONFIG_H`n#define LAME_CONFIG_H`n#define HAVE_INTTYPES_H 1`n#define HAVE_STDINT_H 1`n#define HAVE_STDLIB_H 1`n#define HAVE_STRING_H 1`n#define HAVE_STRINGS_H 0`n#define HAVE_SYS_STAT_H 0`n#define HAVE_SYS_TYPES_H 0`n#define HAVE_UNISTD_H 0`n#define SIZEOF_INT 4`n#define SIZEOF_LONG 4`n#define SIZEOF_LONG_LONG 8`n#define SIZEOF_FLOAT 4`n#define SIZEOF_DOUBLE 8`n#define HAVE_XMMINTRIN_H 1`n#endif"
            Set-Content config.h -Value $configH -Encoding UTF8
          }

          $buildDir = "$env:TEMP\lame-src\build"
          New-Item -ItemType Directory -Path $buildDir -Force | Out-Null

          # 为 MSVC 修补 vector 源文件：确保优先包含 stdint.h
          Get-ChildItem libmp3lame\vector\*.c -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if ($content -notmatch '#include\s+<stdint\.h>') {
              Set-Content $_.FullName "#include <stdint.h>`n$content" -NoNewline
              Write-Host "已修补 $($_.Name) 以包含 stdint.h"
            }
          }

          $srcFiles = @()
          Get-ChildItem libmp3lame\*.c -Recurse | ForEach-Object { $srcFiles += $_.FullName }
          Get-ChildItem mpglib\*.c | ForEach-Object { $srcFiles += $_.FullName }

          $objs = @()
          foreach ($src in $srcFiles) {
            $base = [System.IO.Path]::GetFileNameWithoutExtension($src)
            $obj = Join-Path $buildDir "$base.obj"
            cl.exe /nologo /MT /O2 /c /W0 /DHAVE_CONFIG_H /FIstdint.h /Iinclude /Ilibmp3lame /Impglib /I. "$src" /Fo"$obj"
            if ($LASTEXITCODE -ne 0) { throw "Failed to compile $src" }
            $objs += $obj
          }

          lib.exe /nologo /out:"$lamePrefix\lib\libmp3lame.lib" $objs
          if ($LASTEXITCODE -ne 0) { throw "Failed to create libmp3lame.lib" }

          Copy-Item "$lamePrefix\lib\libmp3lame.lib" "$lamePrefix\lib\mp3lame.lib" -Force
          Copy-Item include\lame.h "$lamePrefix\include\lame\lame.h" -Force

          $pcDir = "$lamePrefixMixed/lib/pkgconfig"
          @(
            "prefix=$lamePrefixMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            'Libs: -lmp3lame',
            'Cflags: -I${includedir}'
          ) | Set-Content "$pcDir/libmp3lame.pc" -Encoding UTF8

          Write-Host "已在 $lamePrefix 编译 libmp3lame"
          Get-ChildItem "$lamePrefix\lib\*.lib"
          Get-Content "$pcDir/libmp3lame.pc"

          echo "LAME_PREFIX=$lamePrefixMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LAME_PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 配置 vcpkg NuGet 缓存
        shell: powershell
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          if (-not $env:GH_PACKAGES_TOKEN) { Write-Host "GH_PACKAGES_TOKEN not set, skipping NuGet binary cache"; exit 0 }
          $vcpkgExe = "$v\vcpkg.exe"
          $nuget = & $vcpkgExe fetch nuget | Where-Object { $_ } | Select-Object -Last 1
          if (-not $nuget) { throw "Failed to fetch vcpkg nuget" }
          Write-Host "nuget: $nuget"
          cmd /c "`"$nuget`" sources Remove -Name GitHubPackages 2>nul || exit /b 0"
          & $nuget sources add -Source "$env:FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "${{ github.repository_owner }}" -Password "$env:GH_PACKAGES_TOKEN"
          & $nuget setapikey "$env:GH_PACKAGES_TOKEN" -Source "$env:FEED_URL"
          echo "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
        continue-on-error: true

      - name: 安装 vcpkg 依赖
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          # 主动更新 vcpkg 到最新 baseline
          Write-Host "Updating vcpkg baseline..."
          $before = (git -C $v rev-parse HEAD).Trim()
          Write-Host "Current vcpkg baseline: $before"
          $isShallow = (git -C $v rev-parse --is-shallow-repository 2>$null).Trim()
          if ($isShallow -eq 'true') {
            git -C $v fetch origin --unshallow 2>$null
          }
          git -C $v pull --ff-only origin master
          $after = (git -C $v rev-parse HEAD).Trim()
          if ($before -ne $after) {
            Write-Host "vcpkg baseline updated: $before -> $after"
          } else {
            Write-Host "vcpkg baseline is already up to date."
          }
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          $env:Path = "$v;" + $env:Path
          $inst = "$v\installed\arm64-windows-static"
          & "$v\vcpkg.exe" install --triplet arm64-windows-static pkgconf fdk-aac sdl2 libiconv zlib pthreads x264 x265 libvpx opus libvorbis libtheora aom libwebp libass freetype fontconfig soxr openjpeg snappy opencl vulkan-headers svt-av1 dav1d openh264 libtwolame speex libjxl libopenmpt shaderc
          # 转换为正斜杠，以便 pkg-config（bash）可以使用该路径
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              foreach ($suffix in @('', '-static', '_static')) {
                $p = Join-Path "$inst\lib" "${name}${suffix}.lib"
                if (Test-Path $p) { return "${name}${suffix}.lib" }
              }
            }
            # 诊断：显示可用的 .lib 文件以帮助解决名称不匹配
            Write-Host "${inst}\lib 下可用的 .lib 文件："
            Get-ChildItem "${inst}\lib\*.lib" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }
          function Get-PortVersion($portName) {
            $json = "$inst\share\$portName\vcpkg.json"
            $control = "$inst\share\$portName\CONTROL"
            $ver = $null
            if (Test-Path $json) {
              $data = Get-Content $json -Raw | ConvertFrom-Json
              $ver = $data.version
              if (-not $ver) { $ver = $data.'version-semver' }
              if (-not $ver) { $ver = $data.'version-string' }
              if (-not $ver) { $ver = $data.'version-date' }
            } elseif (Test-Path $control) {
              $m = Select-String -Path $control -Pattern '^Version:\s*(.+)$'
              if ($m) { $ver = $m.Matches[0].Groups[1].Value.Trim() }
            }
            if (-not $ver) { $ver = 'unknown' }
            return $ver
          }

          # vcpkg 端口并不总是提供 pkg-config 文件；创建 ffmpeg 期望的文件。
          # libmp3lame.pc 由独立的编译 libmp3lame 步骤提供。

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            "Version: $(Get-PortVersion 'fdk-aac')",
            "Libs: $fdkLib"
          )
          # ffplay 需要 SDL2；较新的 vcpkg 端口提供 sdl2.pc，仅在缺失时创建回退。
          if (-not (Test-Path "$pcDir/sdl2.pc")) {
            $sdl2Lib = Find-ImportLib @('SDL2')
            if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
            $sdl2mainLib = Find-ImportLib @('SDL2main')
            $sdl2Libs = if ($sdl2mainLib) { "$sdl2mainLib $sdl2Lib" } else { "$sdl2Lib" }
            Write-Utf8 "$pcDir/sdl2.pc" @(
              "prefix=$instMixed",
              'exec_prefix=${prefix}',
              'libdir=${prefix}/lib',
              'includedir=${prefix}/include',
              '',
              'Name: sdl2',
              'Description: Simple DirectMedia Layer',
              "Version: $(Get-PortVersion 'sdl2')",
              "Libs: $sdl2Libs",
              'Cflags: -I${includedir} -I${includedir}/SDL2'
            )
            Write-Host "已创建回退 sdl2.pc"
          } else {
            Write-Host "使用 vcpkg 提供的 sdl2.pc"
          }
          # 软件音视频编解码器的回退 pkg-config 文件（vcpkg 并不总是提供）。
          $libx264Lib = Find-ImportLib @('x264', 'libx264')
          if ($libx264Lib) {
            if (-not (Test-Path "$pcDir/libx264.pc")) {
              Write-Utf8 "$pcDir/libx264.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libx264",
                "Description: libx264 library",
                "Version: $(Get-PortVersion 'x264')",
                "Libs: $libx264Lib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libx264.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libx264.pc"
            }
          } else {
            Write-Host "::warning::未找到 libx264 导入库；跳过 .pc"
          }
          $libx265Lib = Find-ImportLib @('x265', 'libx265')
          if ($libx265Lib) {
            if (-not (Test-Path "$pcDir/libx265.pc")) {
              Write-Utf8 "$pcDir/libx265.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libx265",
                "Description: libx265 library",
                "Version: $(Get-PortVersion 'x265')",
                "Libs: $libx265Lib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libx265.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libx265.pc"
            }
          } else {
            Write-Host "::warning::未找到 libx265 导入库；跳过 .pc"
          }
          $libvpxLib = Find-ImportLib @('vpx', 'libvpx', 'vpxmd')
          if ($libvpxLib) {
            if (-not (Test-Path "$pcDir/libvpx.pc")) {
              Write-Utf8 "$pcDir/libvpx.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libvpx",
                "Description: libvpx library",
                "Version: $(Get-PortVersion 'libvpx')",
                "Libs: $libvpxLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libvpx.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libvpx.pc"
            }
          } else {
            Write-Host "::warning::未找到 libvpx 导入库；跳过 .pc"
          }
          $opusLib = Find-ImportLib @('opus')
          if ($opusLib) {
            if (-not (Test-Path "$pcDir/opus.pc")) {
              Write-Utf8 "$pcDir/opus.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: opus",
                "Description: opus library",
                "Version: $(Get-PortVersion 'opus')",
                "Libs: $opusLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 opus.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 opus.pc"
            }
          } else {
            Write-Host "::warning::未找到 opus 导入库；跳过 .pc"
          }
          $vorbisLib = Find-ImportLib @('vorbis', 'libvorbis')
          if ($vorbisLib) {
            if (-not (Test-Path "$pcDir/vorbis.pc")) {
              Write-Utf8 "$pcDir/vorbis.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: vorbis",
                "Description: vorbis library",
                "Version: $(Get-PortVersion 'libvorbis')",
                "Libs: $vorbisLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 vorbis.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 vorbis.pc"
            }
          } else {
            Write-Host "::warning::未找到 vorbis 导入库；跳过 .pc"
          }
          $vorbisencLib = Find-ImportLib @('vorbisenc', 'libvorbisenc')
          if ($vorbisencLib) {
            if (-not (Test-Path "$pcDir/vorbisenc.pc")) {
              Write-Utf8 "$pcDir/vorbisenc.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: vorbisenc",
                "Description: vorbisenc library",
                "Version: $(Get-PortVersion 'libvorbis')",
                "Requires: vorbis",
                "Libs: $vorbisencLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 vorbisenc.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 vorbisenc.pc"
            }
          } else {
            Write-Host "::warning::未找到 vorbisenc 导入库；跳过 .pc"
          }
          $theoraLib = Find-ImportLib @('theora', 'libtheora')
          if ($theoraLib) {
            if (-not (Test-Path "$pcDir/theora.pc")) {
              Write-Utf8 "$pcDir/theora.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: theora",
                "Description: theora library",
                "Version: $(Get-PortVersion 'libtheora')",
                "Libs: $theoraLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 theora.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 theora.pc"
            }
          } else {
            Write-Host "::warning::未找到 theora 导入库；跳过 .pc"
          }
          $theoradecLib = Find-ImportLib @('theoradec', 'libtheoradec')
          if ($theoradecLib) {
            if (-not (Test-Path "$pcDir/theoradec.pc")) {
              Write-Utf8 "$pcDir/theoradec.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: theoradec",
                "Description: theoradec library",
                "Version: $(Get-PortVersion 'libtheora')",
                "Libs: $theoradecLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 theoradec.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 theoradec.pc"
            }
          } else {
            Write-Host "::warning::未找到 theoradec 导入库；跳过 .pc"
          }
          $theoraencLib = Find-ImportLib @('theoraenc', 'libtheoraenc')
          if ($theoraencLib) {
            if (-not (Test-Path "$pcDir/theoraenc.pc")) {
              Write-Utf8 "$pcDir/theoraenc.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: theoraenc",
                "Description: theoraenc library",
                "Version: $(Get-PortVersion 'libtheora')",
                "Libs: $theoraencLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 theoraenc.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 theoraenc.pc"
            }
          } else {
            Write-Host "::warning::未找到 theoraenc 导入库；跳过 .pc"
          }
          $libaomLib = Find-ImportLib @('aom', 'libaom')
          if ($libaomLib) {
            if (-not (Test-Path "$pcDir/libaom.pc")) {
              Write-Utf8 "$pcDir/libaom.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libaom",
                "Description: libaom library",
                "Version: $(Get-PortVersion 'aom')",
                "Libs: $libaomLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libaom.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libaom.pc"
            }
          } else {
            Write-Host "::warning::未找到 libaom 导入库；跳过 .pc"
          }
          $libwebpLib = Find-ImportLib @('webp', 'libwebp')
          if ($libwebpLib) {
            if (-not (Test-Path "$pcDir/libwebp.pc")) {
              Write-Utf8 "$pcDir/libwebp.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libwebp",
                "Description: libwebp library",
                "Version: $(Get-PortVersion 'libwebp')",
                "Libs: $libwebpLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libwebp.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libwebp.pc"
            }
          } else {
            Write-Host "::warning::未找到 libwebp 导入库；跳过 .pc"
          }
          $libassLib = Find-ImportLib @('ass', 'libass')
          if ($libassLib) {
            if (-not (Test-Path "$pcDir/libass.pc")) {
              Write-Utf8 "$pcDir/libass.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libass",
                "Description: libass library",
                "Version: $(Get-PortVersion 'libass')",
                "Libs: $libassLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libass.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libass.pc"
            }
          } else {
            Write-Host "::warning::未找到 libass 导入库；跳过 .pc"
          }
          $freetype2Lib = Find-ImportLib @('freetype', 'libfreetype')
          if ($freetype2Lib) {
            if (-not (Test-Path "$pcDir/freetype2.pc")) {
              Write-Utf8 "$pcDir/freetype2.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: freetype2",
                "Description: freetype2 library",
                "Version: $(Get-PortVersion 'freetype')",
                "Libs: $freetype2Lib",
                "Cflags: -I${includedir} -I${includedir}/freetype2"
              )
              Write-Host "已创建回退 freetype2.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 freetype2.pc"
            }
          } else {
            Write-Host "::warning::未找到 freetype2 导入库；跳过 .pc"
          }
          $fontconfigLib = Find-ImportLib @('fontconfig', 'libfontconfig')
          if ($fontconfigLib) {
            if (-not (Test-Path "$pcDir/fontconfig.pc")) {
              Write-Utf8 "$pcDir/fontconfig.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: fontconfig",
                "Description: fontconfig library",
                "Version: $(Get-PortVersion 'fontconfig')",
                "Libs: $fontconfigLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 fontconfig.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 fontconfig.pc"
            }
          } else {
            Write-Host "::warning::未找到 fontconfig 导入库；跳过 .pc"
          }
          $zimgLib = Find-ImportLib @('zimg', 'libzimg')
          if ($zimgLib) {
            if (-not (Test-Path "$pcDir/zimg.pc")) {
              Write-Utf8 "$pcDir/zimg.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: zimg",
                "Description: zimg library",
                "Version: $(Get-PortVersion 'zimg')",
                "Libs: $zimgLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 zimg.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 zimg.pc"
            }
          } else {
            Write-Host "::warning::未找到 zimg 导入库；跳过 .pc"
          }
          $soxrLib = Find-ImportLib @('soxr', 'libsoxr')
          if ($soxrLib) {
            if (-not (Test-Path "$pcDir/soxr.pc")) {
              Write-Utf8 "$pcDir/soxr.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: soxr",
                "Description: soxr library",
                "Version: $(Get-PortVersion 'soxr')",
                "Libs: $soxrLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 soxr.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 soxr.pc"
            }
          } else {
            Write-Host "::warning::未找到 soxr 导入库；跳过 .pc"
          }
          $libopenjp2Lib = Find-ImportLib @('openjp2', 'libopenjp2')
          if ($libopenjp2Lib) {
            if (-not (Test-Path "$pcDir/libopenjp2.pc")) {
              Write-Utf8 "$pcDir/libopenjp2.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libopenjp2",
                "Description: libopenjp2 library",
                "Version: $(Get-PortVersion 'openjpeg')",
                "Libs: $libopenjp2Lib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libopenjp2.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libopenjp2.pc"
            }
          } else {
            Write-Host "::warning::未找到 libopenjp2 导入库；跳过 .pc"
          }
          $snappyLib = Find-ImportLib @('snappy', 'libsnappy')
          if ($snappyLib) {
            if (-not (Test-Path "$pcDir/snappy.pc")) {
              Write-Utf8 "$pcDir/snappy.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: snappy",
                "Description: snappy library",
                "Version: $(Get-PortVersion 'snappy')",
                "Libs: $snappyLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 snappy.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 snappy.pc"
            }
          } else {
            Write-Host "::warning::未找到 snappy 导入库；跳过 .pc"
          }

          $libtwolameLib = Find-ImportLib @('twolame', 'libtwolame')
          if ($libtwolameLib) {
            if (-not (Test-Path "$pcDir/libtwolame.pc")) {
              Write-Utf8 "$pcDir/libtwolame.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libtwolame",
                "Description: TwoLAME MP2 encoder library",
                "Version: $(Get-PortVersion 'libtwolame')",
                "Libs: $libtwolameLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libtwolame.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libtwolame.pc"
            }
          } else {
            Write-Host "::warning::未找到 libtwolame 导入库；跳过 .pc"
          }
          $libopenmptLib = Find-ImportLib @('openmpt', 'libopenmpt')
          if ($libopenmptLib) {
            if (-not (Test-Path "$pcDir/libopenmpt.pc")) {
              Write-Utf8 "$pcDir/libopenmpt.pc" @(
                "prefix=$instMixed",
                'exec_prefix=${prefix}',
                'libdir=${prefix}/lib',
                'includedir=${prefix}/include',
                '',
                "Name: libopenmpt",
                "Description: OpenMPT module library",
                "Version: $(Get-PortVersion 'libopenmpt')",
                "Libs: $libopenmptLib",
                "Cflags: -I${includedir}"
              )
              Write-Host "已创建回退 libopenmpt.pc"
            } else {
              Write-Host "使用 vcpkg 提供的 libopenmpt.pc"
            }
          } else {
            Write-Host "::warning::未找到 libopenmpt 导入库；跳过 .pc"
          }

          # 同时创建备用导入库名称，以便 ffmpeg 的非 pkg-config
          # fallbacks (-lmp3lame, -lfdk-aac) can find the files.
          function Ensure-LibAlias($actual, $alias) {
            $actualPath = Join-Path "$inst\lib" $actual
            $aliasPath = Join-Path "$inst\lib" $alias
            if ((Test-Path $actualPath) -and (-not (Test-Path $aliasPath))) {
              Copy-Item $actualPath $aliasPath
              Write-Host "Created alias $alias -> $actual"
            }
          }
          Ensure-LibAlias $fdkLib "fdk-aac.lib"
          Ensure-LibAlias $fdkLib "libfdk-aac.lib"
          if ($vplLib) {
            Ensure-LibAlias $vplLib "vpl.lib"
            Ensure-LibAlias $vplLib "libvpl.lib"
          }


          # Alternate import-library names for ffmpeg linker fallbacks.
          if ($libx264Lib) { Ensure-LibAlias $libx264Lib "libx264.lib" }
          if ($libx264Lib) { Ensure-LibAlias $libx264Lib "x264.lib" }
          if ($libx265Lib) { Ensure-LibAlias $libx265Lib "libx265.lib" }
          if ($libx265Lib) { Ensure-LibAlias $libx265Lib "x265.lib" }
          if ($libvpxLib) { Ensure-LibAlias $libvpxLib "libvpx.lib" }
          if ($libvpxLib) { Ensure-LibAlias $libvpxLib "vpx.lib" }
          if ($opusLib) { Ensure-LibAlias $opusLib "opus.lib" }
          if ($vorbisLib) { Ensure-LibAlias $vorbisLib "vorbis.lib" }
          if ($vorbisencLib) { Ensure-LibAlias $vorbisencLib "vorbisenc.lib" }
          if ($theoraLib) { Ensure-LibAlias $theoraLib "theora.lib" }
          if ($theoradecLib) { Ensure-LibAlias $theoradecLib "theoradec.lib" }
          if ($theoraencLib) { Ensure-LibAlias $theoraencLib "theoraenc.lib" }
          if ($libaomLib) { Ensure-LibAlias $libaomLib "libaom.lib" }
          if ($libaomLib) { Ensure-LibAlias $libaomLib "aom.lib" }
          if ($libwebpLib) { Ensure-LibAlias $libwebpLib "libwebp.lib" }
          if ($libwebpLib) { Ensure-LibAlias $libwebpLib "webp.lib" }
          if ($libassLib) { Ensure-LibAlias $libassLib "libass.lib" }
          if ($libassLib) { Ensure-LibAlias $libassLib "ass.lib" }
          if ($freetype2Lib) { Ensure-LibAlias $freetype2Lib "freetype.lib" }
          if ($fontconfigLib) { Ensure-LibAlias $fontconfigLib "fontconfig.lib" }
          if ($zimgLib) { Ensure-LibAlias $zimgLib "zimg.lib" }
          if ($soxrLib) { Ensure-LibAlias $soxrLib "soxr.lib" }
          if ($libopenjp2Lib) { Ensure-LibAlias $libopenjp2Lib "libopenjp2.lib" }
          if ($libopenjp2Lib) { Ensure-LibAlias $libopenjp2Lib "openjp2.lib" }
          if ($snappyLib) { Ensure-LibAlias $snappyLib "snappy.lib" }
          if ($libtwolameLib) { Ensure-LibAlias $libtwolameLib "libtwolame.lib" }
          if ($libtwolameLib) { Ensure-LibAlias $libtwolameLib "twolame.lib" }
          if ($libopenmptLib) { Ensure-LibAlias $libopenmptLib "libopenmpt.lib" }
          if ($libopenmptLib) { Ensure-LibAlias $libopenmptLib "openmpt.lib" }
          # 来自 vcpkg 的 pkg-config 实现（此运行器上的 Git for Windows 缺少它）
          $pkgconf = Get-ChildItem -Path "$inst\bin\pkgconf.exe", "$inst\tools\pkgconf\pkgconf.exe", "$inst\tools\pkgconf\pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgconf) { throw "pkgconf.exe not found under $inst" }
          $pkgconfMixed = ($pkgconf.FullName -replace '\\','/')
          Write-Host "pkg-config: $pkgconfMixed"

          Write-Host "已安装的导入库："
          Get-ChildItem "$inst\lib\*.lib" | Select-Object -ExpandProperty Name
          if ($env:LAME_PKG_CONFIG_PATH -and (Test-Path "$env:LAME_PKG_CONFIG_PATH/libmp3lame.pc")) {
            Write-Host "libmp3lame.pc:"
            Get-Content "$env:LAME_PKG_CONFIG_PATH/libmp3lame.pc"
          }
          Write-Host "libfdk-aac.pc:"
          Get-Content "$pcDir/libfdk-aac.pc"

          echo "VCPKG_INSTALLED=$instMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG=$pkgconfMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $lamePc = $env:LAME_PKG_CONFIG_PATH
          $pkgConfigPath = if ($lamePc) { "$pcDir;$lamePc" } else { $pcDir }
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $shadercTools = "$inst\tools\shaderc"
          if (Test-Path "$shadercTools\glslc.exe") { echo "$shadercTools" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append; Write-Host "shaderc tools: $shadercTools" }

      - name: 从源码编译 zimg
        shell: powershell
        run: |
          $zimgRoot = "$env:TEMP\zimg-src"
          Remove-Item -Recurse -Force $zimgRoot -ErrorAction SilentlyContinue
          git clone --depth 1 --recurse-submodules https://github.com/sekrit-twc/zimg.git $zimgRoot
          cd $zimgRoot
          $ver = (Select-String -Path "$zimgRoot\configure.ac" -Pattern 'AC_INIT\(\[zimg\], \[([^\]]+)\]').Matches.Groups[1].Value
          if (-not $ver) { $ver = '3.0.6' }
          $plat = if ($env:VSCMD_ARG_TGT_ARCH -eq 'arm64' -or $env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'ARM64' } else { 'x64' }
          # 强制 zimg 使用静态运行时 (/MT)，与 FFmpeg/vcpkg x64-windows-static 保持一致
          $props = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
            '  <PropertyGroup>',
            '    <WholeProgramOptimization>false</WholeProgramOptimization>',
            '  </PropertyGroup>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <RuntimeLibrary>MultiThreaded</RuntimeLibrary>',
            '      <WholeProgramOptimization>false</WholeProgramOptimization>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          )
          [System.IO.File]::WriteAllLines("$zimgRoot\_msvc\Directory.Build.props", $props, [System.Text.UTF8Encoding]::new($false))
          msbuild "$zimgRoot\_msvc\zimg.sln" /p:Configuration=Release /p:Platform=$plat /t:zimg /p:PlatformToolset=v145 /p:WindowsTargetPlatformVersion=10.0 /p:WholeProgramOptimization=false /m
          $lib = Get-ChildItem "$zimgRoot\_msvc" -Recurse -Filter "z.lib" | Select-Object -First 1
          if (-not $lib) { throw "z.lib not found after building zimg" }
          $prefix = $env:VCPKG_INSTALLED
          New-Item -ItemType Directory -Path "$prefix\include", "$prefix\lib", "$prefix\lib\pkgconfig" -Force | Out-Null
          Copy-Item "$zimgRoot\src\zimg\api\zimg.h" "$prefix\include\zimg.h" -Force
          if (Test-Path "$zimgRoot\src\zimg\api\zimg++.hpp") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.hpp" "$prefix\include\zimg++.hpp" -Force
          } elseif (Test-Path "$zimgRoot\src\zimg\api\zimg++.h") {
            Copy-Item "$zimgRoot\src\zimg\api\zimg++.h" "$prefix\include\zimg++.h" -Force
          }
          Copy-Item $lib.FullName "$prefix\lib\z.lib" -Force
          Copy-Item $lib.FullName "$prefix\lib\zimg.lib" -Force
          $pcMixed = ($prefix -replace '\\','/')
          $pc = @(
            "prefix=$pcMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: zimg',
            'Description: z.lib image processing library',
            "Version: $ver",
            'Libs: ${libdir}/zimg.lib',
            'Cflags: -I${includedir}'
          )
          [System.IO.File]::WriteAllLines("$prefix\lib\pkgconfig\zimg.pc", $pc, [System.Text.UTF8Encoding]::new($false))
          Write-Host "zimg $ver built for $plat"

      - name: 检查 vcpkg pkg-config
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          echo "PKG_CONFIG=${PKG_CONFIG}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- .pc files ---"
          find "${VCPKG_INSTALLED}/lib/pkgconfig" -name '*.pc' -print0 2>/dev/null | xargs -0 -I{} sh -c 'echo "== {} =="; cat "{}"' || true
          echo "--- pkg-config checks ---"
          $PKG_CONFIG --exists libmp3lame && echo "libmp3lame OK: version=$($PKG_CONFIG --modversion libmp3lame) libs=$($PKG_CONFIG --libs libmp3lame) cflags=$($PKG_CONFIG --cflags libmp3lame)" || echo "未找到 libmp3lame"
          $PKG_CONFIG --exists libfdk-aac && echo "libfdk-aac OK: version=$($PKG_CONFIG --modversion libfdk-aac) libs=$($PKG_CONFIG --libs libfdk-aac) cflags=$($PKG_CONFIG --cflags libfdk-aac)" || echo "未找到 libfdk-aac"
          $PKG_CONFIG --exists sdl2 && echo "sdl2 OK: version=$($PKG_CONFIG --modversion sdl2) libs=$($PKG_CONFIG --libs sdl2) cflags=$($PKG_CONFIG --cflags sdl2)" || echo "未找到 sdl2"
          $PKG_CONFIG --exists vpl && echo "vpl OK: version=$($PKG_CONFIG --modversion vpl) libs=$($PKG_CONFIG --libs vpl) cflags=$($PKG_CONFIG --cflags vpl)" || echo "未找到 vpl"
          $PKG_CONFIG --exists zimg && echo "zimg OK: version=$($PKG_CONFIG --modversion zimg) libs=$($PKG_CONFIG --libs zimg) cflags=$($PKG_CONFIG --cflags zimg)" || echo "未找到 zimg"

      - name: 编译 VMAF（CPU）
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          # 确保 MSVC link.exe 排在 Git 的 link.EXE 之前供 meson 使用
          CLDIR=$(dirname "$(which cl.exe 2>/dev/null)" 2>/dev/null || true)
          [ -n "$CLDIR" ] && export PATH="${CLDIR}:${PATH}"
          # Patch VMAF for Windows ARM64 MSVC: missing POSIX headers, ARM64 intrinsics,
          # and void* arithmetic which MSVC does not allow.
          python3 -c '
          import pathlib
          for path in ("src/feature/mkdirp.c", "src/feature/mkdirp.h", "src/log.c",
                       "src/feature/cuda/integer_adm_cuda.c", "src/feature/integer_vif.h",
                       "src/feature/integer_vif.c", "src/feature/integer_adm.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              s = s.replace("#include <unistd.h>", "#ifdef _WIN32\n#include <direct.h>\n#include <io.h>\n#else\n#include <unistd.h>\n#endif")
              s = s.replace("#include <sys/types.h>", "#ifdef _WIN32\n#include <direct.h>\ntypedef int mode_t;\n#else\n#include <sys/types.h>\n#endif")
              s = s.replace("int rc = mkdir(pathname);", "int rc = _mkdir(pathname);")
              s = s.replace(
                  "#ifdef _MSC_VER\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)__lzcnt(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)__lzcnt64(x);\n}\n\n#endif",
                  "#if defined(_MSC_VER) && defined(_M_ARM64)\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)_CountLeadingZeros(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)_CountLeadingZeros64(x);\n}\n\n#elif defined(_MSC_VER)\n#include <intrin.h>\n\nstatic inline int __builtin_clz(unsigned x) {\n    return (int)__lzcnt(x);\n}\n\nstatic inline int __builtin_clzll(unsigned long long x) {\n    return (int)__lzcnt64(x);\n}\n\n#endif"
              )
              s = s.replace(
                  "void *data = aligned_malloc(data_sz, MAX_ALIGN);",
                  "char *data = (char *)aligned_malloc(data_sz, MAX_ALIGN);"
              )
              s = s.replace(
                  "#include \"integer_adm.h\"",
                  "#include \"integer_adm.h\"\n\n#if defined(_MSC_VER) && defined(_M_ARM64)\n#include <intrin.h>\n#define __builtin_clz(x) _CountLeadingZeros(x)\n#endif"
              )
              p.write_text(s, encoding="utf-8")
          compat_dir = pathlib.Path("src/compat/msvc/common")
          compat_dir.mkdir(parents=True, exist_ok=True)
          (compat_dir / "attributes.h").write_text(
              "#ifndef COMPAT_COMMON_ATTRIBUTES_H_\n"
              "#define COMPAT_COMMON_ATTRIBUTES_H_\n"
              "#endif\n"
          )
          '
          # MSVC C11 does not support C99 variable-length arrays; replace with _alloca.
          python3 -c '
          import pathlib
          for path in ("src/predict.c", "src/libvmaf.c", "src/read_json_model.c"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text(encoding="utf-8")
              if "#include <malloc.h>" not in s:
                  s = "#include <malloc.h>\n" + s
              s = s.replace("double scores[model_collection->cnt];", "double *scores = (double *)_alloca(sizeof(double) * model_collection->cnt);")
              s = s.replace("char name[name_sz];", "char *name = (char *)_alloca(name_sz);")
              s = s.replace("char cfg_name[cfg_name_sz];", "char *cfg_name = (char *)_alloca(cfg_name_sz);")
              s = s.replace("char generated_key[generated_key_sz];", "char generated_key[5];")
              p.write_text(s, encoding="utf-8")
          '
          # PThreads4W（通过 vcpkg 安装）在 Windows 上提供 pthread.h
          PTHREAD_CFLAGS=""
          PTHREAD_LDFLAGS=""
          if [ -n "${VCPKG_INSTALLED:-}" ] && [ -f "${VCPKG_INSTALLED}/include/pthread.h" ]; then
            PTHREAD_CFLAGS="-I$(cygpath -m "$VCPKG_INSTALLED")/include"
            PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthreadVC*.lib' | head -n1)"
            [ -z "$PTHREAD_LIB" ] && PTHREAD_LIB="$(find "${VCPKG_INSTALLED}/lib" -maxdepth 1 -name 'pthread*.lib' | head -n1)"
            if [ -n "$PTHREAD_LIB" ]; then
              PTHREAD_LDFLAGS="$(cygpath -m "$PTHREAD_LIB" 2>/dev/null || echo "$PTHREAD_LIB")"
              echo "使用 PThreads4W: $PTHREAD_LIB"
              # Make pthreadVC3.dll discoverable at runtime (e.g. for meson sanity checks)
              if [ -d "${VCPKG_INSTALLED}/bin" ]; then
                export PATH="${VCPKG_INSTALLED}/bin:${PATH}"
              fi
            else
              echo "::error::找到 pthread.h，但在 ${VCPKG_INSTALLED}/lib 下没有 pthread*.lib"
              exit 1
            fi
          fi
          # 辅助函数：从位置参数构建 Meson 数组字面量（安全处理空格）
          __meson_array() {
            local arr="[" first=1
            for x in "$@"; do
              [ "$first" -eq 1 ] || arr="$arr,"
              first=0
              arr="$arr\"$x\""
            done
            arr="$arr]"
            printf '%s' "$arr"
          }
          VMAF_C_ARGS=$(__meson_array "-D_USE_MATH_DEFINES" ${PTHREAD_CFLAGS:+"$PTHREAD_CFLAGS"})
          VMAF_LINK_ARGS=$(__meson_array ${PTHREAD_LDFLAGS:+"$PTHREAD_LDFLAGS"})
          # ARM64: keep it simple with MSVC; NEON asm is different from x86 AVX2
          PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" \
          meson setup build --buildtype release --prefix="$P" -Denable_cuda=false -Denable_asm=false -Db_vscrt=mt -Ddefault_library=static \
            -Denable_tests=false -Denable_tools=false -Denable_docs=false -Dcpp_std=c++17 \
            -Dc_args="$VMAF_C_ARGS" \
            -Dc_link_args="$VMAF_LINK_ARGS"
          ninja -vC build

          # 手动安装：在 Windows/Clang 上构建静态 libvmaf，以避免 DLL 导入库问题。
          mkdir -p "$P/lib" "$P/lib/pkgconfig" "$P/include/libvmaf"

          vmaf_static_lib=""
          for cand in build/src/libvmaf.a build/src/vmaf.lib build/src/libvmaf.lib; do
            [ -f "$cand" ] && { vmaf_static_lib="$cand"; break; }
          done
          [ -z "$vmaf_static_lib" ] && { echo "::error::在 build/src 下未找到 VMAF 静态库"; ls -la build/src; exit 1; }

          cp "$vmaf_static_lib" "$P/lib/vmaf.lib"
          cp include/libvmaf/*.h "$P/include/libvmaf/"
          [ -f build/include/version.h ] && cp build/include/version.h "$P/include/libvmaf/"
          [ -f build/include/libvmaf/version.h ] && cp build/include/libvmaf/version.h "$P/include/libvmaf/"

          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          printf '%s\n' \
            "prefix=${P_MIXED}" \
            'exec_prefix=${prefix}' \
            'libdir=${prefix}/lib' \
            'includedir=${prefix}/include' \
            '' \
            'Name: libvmaf' \
            'Description: Netflix VMAF library' \
            'Version: 3.0.0' \
            "Libs: -lvmaf ${PTHREAD_LDFLAGS} -ladvapi32" \
            'Cflags: -I${includedir}/libvmaf' \
            > "$P/lib/pkgconfig/libvmaf.pc"
          echo "PKG_CONFIG_PATH=$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc"
          echo "--- pkg-config check ---"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"

      - name: 导出 VMAF meson 日志
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ]; then
            echo "=== /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt ==="
            cat /tmp/vmaf/libvmaf/build/meson-logs/meson-log.txt
          fi

      - name: 编译 FFmpeg (MSVC ARM64)
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          set -e; P="${HOME}/ffmpeg-install"
          P_MIXED="$(cygpath -m "$P" 2>/dev/null || echo "$P")"
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          # 规范化 pkg-config 路径，以便 bash/ffmpeg configure 能可靠执行
          if command -v cygpath >/dev/null 2>&1; then
            PKG_CONFIG="$(cygpath -u "$PKG_CONFIG")"
          fi
          export PKG_CONFIG
          echo "pkg-config: ${PKG_CONFIG} ($($PKG_CONFIG --version 2>&1 || echo 未找到))"
          export PKG_CONFIG_PATH="$P_MIXED/lib/pkgconfig;${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
          echo "--- libvmaf.pc ---"
          cat "$P/lib/pkgconfig/libvmaf.pc" || true
          echo "--- pkg-config libvmaf ---"
          echo "modversion: $($PKG_CONFIG --modversion libvmaf 2>&1 || true)"
          echo "libs: $($PKG_CONFIG --libs libvmaf 2>&1 || true)"
          cd /tmp && rm -rf gas-preprocessor
          git clone --depth 1 https://github.com/FFmpeg/gas-preprocessor.git gas-preprocessor
          export PATH="/tmp/gas-preprocessor:$PATH"

          cd /tmp && rm -rf ffmpeg-src
          git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          python3 -c 'import pathlib; p = pathlib.Path("configure"); s = p.read_text(encoding="utf-8"); s = s.replace(r'\''gsub(/\\/, "/")'\'', r'\''gsub(/\\\\/, "/")'\''); p.write_text(s, encoding="utf-8")'
          # 修补 ffbuild/library.mak，使 lib.exe 接收 Windows 绝对路径的响应文件。
          python3 -c 'import pathlib; p=pathlib.Path("ffbuild/library.mak"); s=p.read_text(encoding="utf-8"); old="ifeq ($(RESPONSE_FILES),yes)\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nelse"; new="ifeq ($(RESPONSE_FILES),yes)\nifeq ($(findstring lib.exe,$(AR)),lib.exe)\n\t$(Q)$(file > $@.objs,$(subst /,\\\\,$^))\n\t$(AR) $(ARFLAGS) $(AR_O) \"@$(shell python3 -c \"import os; print(os.path.abspath(\\\"$@.objs\\\"))\")\"\nelse\n\t$(Q)echo $^ > $@.objs\n\t$(AR) $(ARFLAGS) $(AR_O) @$@.objs\nendif\nelse"; p.write_text(s.replace(old,new,1),encoding="utf-8")'
          # libsnappy 的 configure 检测在 MSVC 下多传了 -lstdc++，导致链接失败；去掉它。
          sed -i 's/require libsnappy snappy-c.h snappy_compress -lsnappy -lstdc++/require libsnappy snappy-c.h snappy_compress -lsnappy/' configure
          ./configure --toolchain=msvc --prefix="$P" --arch=arm64 \
            --pkg-config="$PKG_CONFIG" \
            --pkg-config-flags="--static" \
            --extra-cflags="-I$P_MIXED/include -I${VCPKG_INSTALLED}/include -I${LAME_PREFIX}/include" \
            --extra-ldflags="-LIBPATH:$P_MIXED/lib -LIBPATH:${VCPKG_INSTALLED}/lib -LIBPATH:${LAME_PREFIX}/lib" \
            --extra-libs="advapi32.lib ole32.lib ws2_32.lib user32.lib bcrypt.lib cfgmgr32.lib gdi32.lib shell32.lib libcpmt.lib" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libmp3lame --enable-libfdk-aac --enable-opencl --enable-vulkan \
            --enable-sdl2 --enable-d3d11va --enable-d3d12va --enable-dxva2 --enable-mediafoundation \
            --disable-doc
          make -j"$(nproc)" && make install

      - name: 失败时导出 ffbuild/config.log
        if: failure()
        shell: bash
        run: |
          # 移除附带损坏 pkg-config / ccache 的 Strawberry 路径
          __clean_path() { local __new="" __e; IFS=':' read -ra __entries <<< "$PATH"; for __e in "${__entries[@]}"; do case "$__e" in *[Ss]trawberry*) ;; *) __new="${__new:+${__new}:}${__e}" ;; esac; done; export PATH="$__new"; }
          __clean_path
          [ -z "$PKG_CONFIG" ] && { echo "::error::PKG_CONFIG 未设置"; exit 1; }
          echo "=== ffbuild/config.log ==="
          cat /tmp/ffmpeg-src/ffbuild/config.log 2>/dev/null || echo "(config.log not found)"
          echo "=== pkg-config libmp3lame ==="
          $PKG_CONFIG --debug libmp3lame 2>&1 | head -40 || true
          echo "=== pkg-config libfdk-aac ==="
          $PKG_CONFIG --debug libfdk-aac 2>&1 | head -40 || true
          echo "=== pkg-config vpl ==="
          $PKG_CONFIG --debug vpl 2>&1 | head -40 || true

      - name: 验证
        shell: bash
        run: |
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -version 2>&1 | head -n5
          echo "--- HW Accel ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -hwaccels 2>&1 || echo "（无）"
          echo "--- Decoders (hw) ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -decoders 2>&1 | grep -iE '_d3d11va|_dxva2|_mf' | head -10 || echo "（无）"
          echo "--- All decoders (first 50) ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -decoders 2>&1 | head -50 || echo "（无）"
          echo "--- Encoders ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -encoders 2>&1 | grep -iE 'libmp3lame|libfdk_aac|_mf' || echo "（无）"
          echo "--- VMAF ---"
          "${HOME}/ffmpeg-install/bin/ffmpeg.exe" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        shell: powershell
        run: |
          $b = "$env:USERPROFILE\ffmpeg-install\bin"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$b\ffmpeg.exe","$b\ffprobe.exe","$b\ffplay.exe" dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath ffmpeg-windows-arm64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-arm64
          path: ffmpeg-windows-arm64.zip
          retention-days: 30

  # ============================================================
  # LINUX — x86 整合版（NVIDIA + Intel QSV + AMD VAAPI）
  # ============================================================
  linux-x86-all:
    name: "Linux x86 整合版（NVIDIA + Intel QSV + AMD VAAPI）"
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates gnupg python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libva-dev libvpl-dev libdrm-dev \
            libx264-dev libx265-dev libvpx-dev libopus-dev libvorbis-dev \
            libtheora-dev libaom-dev libwebp-dev libass-dev libfreetype6-dev \
            libfontconfig1-dev libzimg-dev libsoxr-dev libopenjp2-7-dev \
            libsnappy-dev libvulkan-dev opencl-headers ocl-icd-opencl-dev glslc \
            libsvtav1enc-dev libdav1d-dev libkvazaar-dev libcrypto++-dev libopenh264-dev libxvidcore-dev \
            libtwolame-dev libspeex-dev libcodec2-dev libjxl-dev libopenmpt-dev \
            liblcms2-dev libxxhash-dev libbs2b-dev libaribb24-dev libplacebo-dev glslang-dev spirv-tools librubberband-dev libvidstab-dev
            # 修复 Ubuntu 26.04 中 libkvazaar-dev 的 pkg-config 版本占位符
            kvazaar_ver=$(dpkg-query -W -f='${Version}' libkvazaar-dev 2>/dev/null | sed -E 's/^[0-9]+://; s/^([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/')
            for pc in $(find /usr/lib /usr/local/lib -name kvazaar.pc 2>/dev/null); do
              echo "Found kvazaar.pc: $pc"
              cat "$pc" || true
              pc_dir=$(dirname "$pc")
              if [[ ":${PKG_CONFIG_PATH:-}:" != *":$pc_dir:"* ]]; then
                export PKG_CONFIG_PATH="${pc_dir}${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
              fi
              if [ -n "$kvazaar_ver" ]; then
                sudo sed -i -E "s/^Version:.*/Version: $kvazaar_ver/" "$pc"
                echo "Patched $pc -> Version: $kvazaar_ver"
              fi
            done
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}" | tee -a "$GITHUB_ENV"
            pkg-config --modversion kvazaar || true
            # Debug libplacebo pkg-config
            echo "=== libplacebo pkg-config debug ==="
            find /usr/lib /usr/local/lib -name 'libplacebo.pc' -exec sh -c 'echo "File: $1"; cat "$1"' _ {} \; || true
            echo "libplacebo modversion: $(pkg-config --modversion libplacebo 2>&1 || true)"
            echo "libplacebo static exists: $(pkg-config --static --exists libplacebo 2>&1 && echo OK || echo FAIL)"
            echo "libplacebo static requires:"
            pkg-config --print-requires --static libplacebo 2>&1 || true

      - name: 安装 CUDA 工具包
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget
          # 添加 NVIDIA CUDA 仓库（Ubuntu 26.04）
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-toolkit-13-3
          sudo apt-get update -qq
          sudo apt-get upgrade -y -qq
          # 通过 /usr/local/cuda 软链接使 CUDA 可被发现
          sudo ln -sf /usr/local/cuda-13.3 /usr/local/cuda 2>/dev/null || true

      - name: 检测 CUDA
        run: |
          CUDA_BASE=""
          for d in /usr/local/cuda-* /usr/local/cuda; do
            if [ -d "$d/bin" ] && [ -x "$d/bin/nvcc" ]; then CUDA_BASE="$d"; break; fi
          done
          [ -z "${CUDA_BASE}" ] && { echo "::error::未找到 CUDA"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc" --version

      - name: 编译 nv-codec-headers
        run: |
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX=/usr/local
          sudo make PREFIX=/usr/local install

      - name: 编译 VMAF-CUDA
        run: |
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          export CUDA_PATH="${CUDA_HOME}" CUDACXX="${CUDA_HOME}/bin/nvcc"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          export C_INCLUDE_PATH="${CUDA_HOME}/include:${C_INCLUDE_PATH:-}"
          meson setup build --buildtype release --prefix="${HOME}/ffmpeg-install" --libdir=lib \
            -Denable_cuda=true -Dc_link_args="-lstdc++" -Dcpp_link_args="-lstdc++"
          ninja -vC build && ninja -C build install

      - name: 编译 FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          mkdir -p "$P/lib/pkgconfig"
          printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=/usr/lib/x86_64-linux-gnu\nincludedir=%s\nName: libopenjp2\nDescription: OpenJPEG JPEG 2000 library\nVersion: 2.5.0\nLibs: -L${libdir} -lopenjp2\nCflags: -I${includedir}\n' "$(ls -d /usr/include/openjpeg-* 2>/dev/null | head -1 || echo /usr/include)" > "$P/lib/pkgconfig/libopenjp2.pc"
          # Fallback x265.pc when the distro does not ship it
          printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=/usr/lib/x86_64-linux-gnu\nincludedir=/usr/include\nName: x265\nDescription: H.265/HEVC encoder\nVersion: 1.0.0\nLibs: -L${libdir} -lx265\nLibs.private: -lstdc++ -lm -lgcc -lpthread\nCflags: -I${includedir}\n' > "$P/lib/pkgconfig/x265.pc"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          # 验证 libplacebo 静态链接
          echo "=== manual libplacebo static link test ==="
          printf '%s\n' '#include <libplacebo/vulkan.h>' 'int main(void) { pl_gpu_create(NULL, NULL); return 0; }' > /tmp/pl_test.c
          cc /tmp/pl_test.c $(pkg-config --static --cflags --libs libplacebo) -o /tmp/pl_test 2>&1 && echo "manual link OK" || echo "manual link FAIL"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="${HOME}/ffmpeg-install" --pkg-config-flags="--static" \
            --extra-cflags="-I${HOME}/ffmpeg-install/include -I${CUDA_HOME}/include" \
            --extra-ldflags="-L${HOME}/ffmpeg-install/lib -L${CUDA_HOME}/lib64 -Wl,-rpath,${HOME}/ffmpeg-install/lib" \
            --extra-libs="-lpthread -lm -ldl -lstdc++" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc \
            --enable-cuvid --enable-nvenc --enable-opencl --enable-vulkan \
            --enable-vaapi --enable-libvpl \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libsvtav1 --enable-libdav1d --enable-libkvazaar --enable-libopenh264 --enable-libxvid --enable-libtwolame --enable-libspeex --enable-libcodec2 --enable-libjxl --enable-libopenmpt --enable-libbs2b --enable-libaribb24 --enable-libplacebo --enable-librubberband --enable-libvidstab --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: 裁剪与验证
        run: |
          P="${HOME}/ffmpeg-install"
          export LD_LIBRARY_PATH="${P}/lib:${LD_LIBRARY_PATH:-}"
          strip "${P}/bin/ffmpeg" "${P}/bin/ffprobe" "${P}/bin/ffplay" 2>/dev/null || true
          "${P}/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- NVENC ---"
          "${P}/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc' || echo "（无）"
          echo "--- QSV ---"
          "${P}/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_qsv' | head -10 || echo "（无）"
          echo "--- VAAPI ---"
          "${P}/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep '_vaapi' | head -10 || echo "（无）"
          echo "--- VMAF ---"
          "${P}/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-x86-all.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x86-all
          path: ffmpeg-linux-x86-all.tar.xz
          retention-days: 30

  # ============================================================
  # WINDOWS — x86 整合版（NVIDIA + Intel QSV + AMD AMF）
  # ============================================================
  windows-x86-all:
    name: "Windows x86 整合版（NVIDIA + Intel QSV + AMD AMF）"
    runs-on: windows-2025-vs2026
    permissions:
      packages: write
    env:
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    steps:
      - uses: actions/checkout@v4

      - name: 配置 MSVC（VS 2026）
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64, vsversion: "18.0" }

      - name: 安装构建工具
        shell: powershell
        run: |
          # Chocolatey 的 pkgconfiglite 在 Windows 上不可靠，使用 Git for Windows 的 pkg-config
          choco install -y --no-progress nasm make ninja
          pip install meson
          refreshenv
          # NASM 可能安装在 Program Files 下，显式暴露以便 bash ./configure 能找到
          $nasmDir = $null
          foreach ($d in @("${env:ProgramFiles}\NASM", "${env:ProgramFiles(x86)}\NASM", "C:\ProgramData\chocolatey\bin")) {
            if (Test-Path "$d\nasm.exe") { $nasmDir = $d; break }
          }
          if ($nasmDir) { echo "$nasmDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append; Write-Host "nasm: $nasmDir" }
          if (-not $nasmDir) { Write-Host "::warning::nasm.exe not found" }
          # 确保 nasm 在 bash 步骤的 PATH 中。
          # pkg-config 将由 vcpkg 的 pkgconf 端口提供（稍后安装）。
          echo "C:\ProgramData\chocolatey\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          # 从 PATH 中移除 Strawberry Perl：它的 pkg-config 已损坏，且其 ccache
          # 会破坏 meson。GITHUB_ENV 将清理后的 PATH 传播到后续步骤。
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          [Environment]::SetEnvironmentVariable('PATH', $cleanPath, 'Process')
          echo "PATH=$cleanPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          # 如果可用，使用 VS 提供的 Clang 编译 libvmaf。
          # Clang 仅用于 libvmaf；FFmpeg 本身继续使用 MSVC（cl.exe）。
          # 如果未找到 Clang，编译 VMAF 步骤将回退到 MSVC 并设置 -Denable_asm=false。
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $clangDir = $null
          if (Test-Path $vsWhere) {
            $vsPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath 2>$null | Select-Object -First 1
            if ($vsPath) {
              $candidate = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
              if (Test-Path "$candidate\clang.exe") { $clangDir = $candidate }
            }
          }
          $clangDirUnix = $clangDir -replace '\\','/'
          if ($clangDir) { Write-Host "VS Clang: $clangDir" }
          if ($clangDir) { echo "$clangDir" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append }
          if ($clangDirUnix) { echo "CLANG_BIN=$clangDirUnix" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append }
          if (-not $clangDir) { Write-Host "::warning::VS Clang not found" }

      - name: 编译 libmp3lame（静态）
        shell: powershell
        run: |
          $lamePrefix = "$env:USERPROFILE\lame-install"
          $lamePrefixMixed = $lamePrefix -replace '\\','/'
          New-Item -ItemType Directory -Path "$lamePrefix\include\lame", "$lamePrefix\lib", "$lamePrefix\lib\pkgconfig" -Force | Out-Null

          cd "$env:TEMP"
          Remove-Item -Recurse -Force lame-src -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/TimothyGu/lame.git lame-src
          if ($LASTEXITCODE -ne 0) { throw "Failed to clone LAME source" }
          cd lame-src

          if (Test-Path configMS.h) {
            Copy-Item configMS.h config.h -Force
            Write-Host "使用 configMS.h 作为 config.h"
          }
          elseif (Test-Path vc_solution\config.h) {
            Copy-Item vc_solution\config.h config.h -Force
            Write-Host "使用 vc_solution\config.h"
          }
          else {
            Write-Host "创建最小 config.h"
            $configH = "#ifndef LAME_CONFIG_H`n#define LAME_CONFIG_H`n#define HAVE_INTTYPES_H 1`n#define HAVE_STDINT_H 1`n#define HAVE_STDLIB_H 1`n#define HAVE_STRING_H 1`n#define HAVE_STRINGS_H 0`n#define HAVE_SYS_STAT_H 0`n#define HAVE_SYS_TYPES_H 0`n#define HAVE_UNISTD_H 0`n#define SIZEOF_INT 4`n#define SIZEOF_LONG 4`n#define SIZEOF_LONG_LONG 8`n#define SIZEOF_FLOAT 4`n#define SIZEOF_DOUBLE 8`n#define HAVE_XMMINTRIN_H 1`n#endif"
            Set-Content config.h -Value $configH -Encoding UTF8
          }

          $buildDir = "$env:TEMP\lame-src\build"
          New-Item -ItemType Directory -Path $buildDir -Force | Out-Null

          # 为 MSVC 修补 vector 源文件：确保优先包含 stdint.h
          Get-ChildItem libmp3lame\vector\*.c -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if ($content -notmatch '#include\s+<stdint\.h>') {
              Set-Content $_.FullName "#include <stdint.h>`n$content" -NoNewline
              Write-Host "已修补 $($_.Name) 以包含 stdint.h"
            }
          }

          $srcFiles = @()
          Get-ChildItem libmp3lame\*.c -Recurse | ForEach-Object { $srcFiles += $_.FullName }
          Get-ChildItem mpglib\*.c | ForEach-Object { $srcFiles += $_.FullName }

          $objs = @()
          foreach ($src in $srcFiles) {
            $base = [System.IO.Path]::GetFileNameWithoutExtension($src)
            $obj = Join-Path $buildDir "$base.obj"
            cl.exe /nologo /MT /O2 /c /W0 /DHAVE_CONFIG_H /FIstdint.h /Iinclude /Ilibmp3lame /Impglib /I. "$src" /Fo"$obj"
            if ($LASTEXITCODE -ne 0) { throw "Failed to compile $src" }
            $objs += $obj
          }

          lib.exe /nologo /out:"$lamePrefix\lib\libmp3lame.lib" $objs
          if ($LASTEXITCODE -ne 0) { throw "Failed to create libmp3lame.lib" }

          Copy-Item "$lamePrefix\lib\libmp3lame.lib" "$lamePrefix\lib\mp3lame.lib" -Force
          Copy-Item include\lame.h "$lamePrefix\include\lame\lame.h" -Force

          $pcDir = "$lamePrefixMixed/lib/pkgconfig"
          @(
            "prefix=$lamePrefixMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libmp3lame',
            'Description: LAME MP3 encoder library',
            'Version: 3.100',
            'Libs: -lmp3lame',
            'Cflags: -I${includedir}'
          ) | Set-Content "$pcDir/libmp3lame.pc" -Encoding UTF8

          Write-Host "已在 $lamePrefix 编译 libmp3lame"
          Get-ChildItem "$lamePrefix\lib\*.lib"
          Get-Content "$pcDir/libmp3lame.pc"

          echo "LAME_PREFIX=$lamePrefixMixed" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LAME_PKG_CONFIG_PATH=$pcDir" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 配置 vcpkg NuGet 缓存
        shell: powershell
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          if (-not $env:GH_PACKAGES_TOKEN) { Write-Host "GH_PACKAGES_TOKEN not set, skipping NuGet binary cache"; exit 0 }
          $vcpkgExe = "$v\vcpkg.exe"
          $nuget = & $vcpkgExe fetch nuget | Where-Object { $_ } | Select-Object -Last 1
          if (-not $nuget) { throw "Failed to fetch vcpkg nuget" }
          Write-Host "nuget: $nuget"
          cmd /c "`"$nuget`" sources Remove -Name GitHubPackages 2>nul || exit /b 0"
          & $nuget sources add -Source "$env:FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "${{ github.repository_owner }}" -Password "$env:GH_PACKAGES_TOKEN"
          & $nuget setapikey "$env:GH_PACKAGES_TOKEN" -Source "$env:FEED_URL"
          echo "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
        continue-on-error: true

      - name: 安装 vcpkg 依赖
        shell: powershell
        run: |
          $v = if (Test-Path "C:\vcpkg") { "C:\vcpkg" } else { "$env:VCPKG_INSTALLATION_ROOT" }
          $env:VCPKG_ROOT = $v
          # 主动更新 vcpkg 到最新 baseline
          Write-Host "Updating vcpkg baseline..."
          $before = (git -C $v rev-parse HEAD).Trim()
          Write-Host "Current vcpkg baseline: $before"
          $isShallow = (git -C $v rev-parse --is-shallow-repository 2>$null).Trim()
          if ($isShallow -eq 'true') {
            git -C $v fetch origin --unshallow 2>$null
          }
          git -C $v pull --ff-only origin master
          $after = (git -C $v rev-parse HEAD).Trim()
          if ($before -ne $after) {
            Write-Host "vcpkg baseline updated: $before -> $after"
          } else {
            Write-Host "vcpkg baseline is already up to date."
          }
          if (Test-Path "$v\bootstrap-vcpkg.bat") { & "$v\bootstrap-vcpkg.bat" }
          $env:Path = "$v;" + $env:Path
          $inst = "$v\installed\x64-windows-static"
          & "$v\vcpkg.exe" install --triplet x64-windows-static pkgconf fdk-aac sdl2 libiconv zlib pthreads libvpl x264 x265 libvpx opus libvorbis libtheora aom libwebp libass freetype fontconfig soxr openjpeg snappy opencl vulkan-headers svt-av1 dav1d openh264 libtwolame speex libjxl libopenmpt shaderc
          # 转换为正斜杠，以便 pkg-config（bash）可以使用该路径
          $instMixed = $inst -replace '\\','/'
          $pcDir = "$instMixed/lib/pkgconfig"
          New-Item -ItemType Directory -Path $pcDir -Force | Out-Null

          function Find-ImportLib($candidates) {
            foreach ($name in $candidates) {
              foreach ($suffix in @('', '-static', '_static')) {
                $p = Join-Path "$inst\lib" "${name}${suffix}.lib"
                if (Test-Path $p) { return "${name}${suffix}.lib" }
              }
            }
            # 诊断：显示可用的 .lib 文件以帮助解决名称不匹配
            Write-Host "${inst}\lib 下可用的 .lib 文件："
            Get-ChildItem "${inst}\lib\*.lib" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            return $null
          }
          function Write-Utf8($path, $lines) {
            [System.IO.File]::WriteAllLines($path, $lines, [System.Text.UTF8Encoding]::new($false))
          }
          function Get-PortVersion($portName) {
            $json = "$inst\share\$portName\vcpkg.json"
            $control = "$inst\share\$portName\CONTROL"
            $ver = $null
            if (Test-Path $json) {
              $data = Get-Content $json -Raw | ConvertFrom-Json
              $ver = $data.version
              if (-not $ver) { $ver = $data.'version-semver' }
              if (-not $ver) { $ver = $data.'version-string' }
              if (-not $ver) { $ver = $data.'version-date' }
            } elseif (Test-Path $control) {
              $m = Select-String -Path $control -Pattern '^Version:\s*(.+)$'
              if ($m) { $ver = $m.Matches[0].Groups[1].Value.Trim() }
            }
            if (-not $ver) { $ver = 'unknown' }
            return $ver
          }

          # vcpkg 端口并不总是提供 pkg-config 文件；创建 ffmpeg 期望的文件。
          # libmp3lame.pc 由独立的编译 libmp3lame 步骤提供。

          $fdkLib = Find-ImportLib @('fdk-aac','libfdk-aac','fdk-aac-2')
          if (-not $fdkLib) { throw "fdk-aac import library not found under $inst\lib" }
          Write-Utf8 "$pcDir/libfdk-aac.pc" @(
            "prefix=$instMixed",
            'exec_prefix=${prefix}',
            'libdir=${prefix}/lib',
            'includedir=${prefix}/include',
            '',
            'Name: libfdk-aac',
            'Description: Fraunhofer FDK AAC codec library',
            "Version: $(Get-PortVersion 'fdk-aac')",
            "Libs: $fdkLib"
          )
          # ffplay 需要 SDL2；较新的 vcpkg 端口提供 sdl2.pc，仅在缺失时创建回退。
          if (-not (Test-Path "$pcDir/sdl2.pc")) {
            $sdl2Lib = Find-ImportLib @('SDL2')
            if (-not $sdl2Lib) { throw "SDL2 import library not found under $inst\lib" }
            $sdl2mainLib = Find-ImportLib @('SDL2main')
            $sdl2Libs = if ($sdl2mainLib) { "$sdl2mainLib $sdl2Lib" } else { "$sdl2Lib" }
            Write-Utf8 "$pcDir/sdl2.pc" @(
              "prefix=$instMixed",
              'exec_prefix=${prefix}',
              'libdir=${prefix}/lib',
              'includedir=${prefix}/include',
              '',
              'Name: sdl2',
              'Description: Simple DirectMedia Layer',
              "Version: $(Get-PortVersion 'sdl2')",
              "Libs: $sdl2Libs",
              'Cflags: -I${includedir} -I${includedir}/SDL2'
            )
            Write-Host "已创建回退 sdl2.pc"
          } else {
            Write-Host "使用 vcpkg 提供的 sdl2.pc"
          }
