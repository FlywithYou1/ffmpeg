name: FFmpeg 多厂商构建

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天 0:00 = UTC 前一天 16:00
    - cron: '0 16 * * *'
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - '.github/workflows/build-ffmpeg.yml'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 构建元数据（决定 Release 标签与类型）
  # ============================================================
  metadata:
    name: 构建元数据
    runs-on: ubuntu-26.04
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      should_release: ${{ steps.vars.outputs.should_release }}
    steps:
      - name: 确定 Release 参数
        id: vars
        run: |
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            TAG="nightly-$(date -u +%Y-%m-%d-%H%M%S)"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="prerelease-$(date -u +%Y-%m-%d-%H%M%S)"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================
  # LINUX — NVIDIA（NVENC/CUDA + VMAF-CUDA）
  # ============================================================
  linux-nvidia:
    name: Linux（NVIDIA NVENC/CUDA）
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates gnupg python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libx264-dev libx265-dev libvpx-dev libopus-dev libvorbis-dev \
            libtheora-dev libaom-dev libwebp-dev libass-dev libfreetype6-dev \
            libfontconfig1-dev libzimg-dev libsoxr-dev libopenjp2-7-dev \
            libsnappy-dev libvulkan-dev opencl-headers ocl-icd-opencl-dev glslc \
            libsvtav1enc-dev libdav1d-dev libkvazaar-dev libcrypto++-dev libopenh264-dev libxvidcore-dev \
            libtwolame-dev libspeex-dev libcodec2-dev libjxl-dev libopenmpt-dev \
            liblcms2-dev libxxhash-dev libbs2b-dev libaribb24-dev libplacebo-dev glslang-dev spirv-tools librubberband-dev libvidstab-dev
            # 修复 Ubuntu 26.04 中 libkvazaar-dev 的 pkg-config 版本占位符
            kvazaar_ver=$(dpkg-query -W -f='${Version}' libkvazaar-dev 2>/dev/null | sed -E 's/^[0-9]+://; s/^([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/')
            for pc in $(find /usr/lib /usr/local/lib -name kvazaar.pc 2>/dev/null); do
              echo "Found kvazaar.pc: $pc"
              cat "$pc" || true
              pc_dir=$(dirname "$pc")
              if [[ ":${PKG_CONFIG_PATH:-}:" != *":$pc_dir:"* ]]; then
                export PKG_CONFIG_PATH="${pc_dir}${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
              fi
              if [ -n "$kvazaar_ver" ]; then
                sudo sed -i -E "s/^Version:.*/Version: $kvazaar_ver/" "$pc"
                echo "Patched $pc -> Version: $kvazaar_ver"
              fi
            done
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}" | tee -a "$GITHUB_ENV"
            pkg-config --modversion kvazaar || true
            # Debug libplacebo pkg-config
            echo "=== libplacebo pkg-config debug ==="
            find /usr/lib /usr/local/lib -name 'libplacebo.pc' -exec sh -c 'echo "File: $1"; cat "$1"' _ {} \; || true
            echo "libplacebo modversion: $(pkg-config --modversion libplacebo 2>&1 || true)"
            echo "libplacebo static exists: $(pkg-config --static --exists libplacebo 2>&1 && echo OK || echo FAIL)"
            echo "libplacebo static requires:"
            pkg-config --print-requires --static libplacebo 2>&1 || true

      - name: 安装 CUDA 工具包
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget
          # 添加 NVIDIA CUDA 仓库（Ubuntu 26.04）
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-toolkit-13-3
          sudo apt-get update -qq
          sudo apt-get upgrade -y -qq
          # 通过 /usr/local/cuda 软链接使 CUDA 可被发现
          sudo ln -sf /usr/local/cuda-13.3 /usr/local/cuda 2>/dev/null || true

      - name: 检测 CUDA
        run: |
          CUDA_BASE=""
          for d in /usr/local/cuda-* /usr/local/cuda; do
            if [ -d "$d/bin" ] && [ -x "$d/bin/nvcc" ]; then CUDA_BASE="$d"; break; fi
          done
          [ -z "${CUDA_BASE}" ] && { echo "::error::未找到 CUDA"; exit 1; }
          echo "CUDA_HOME=${CUDA_BASE}" >> "${GITHUB_ENV}"
          "${CUDA_BASE}/bin/nvcc" --version

      - name: 编译 nv-codec-headers
        run: |
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/nv-codec-headers.git
          cd nv-codec-headers
          make -j"$(nproc)" PREFIX=/usr/local
          sudo make PREFIX=/usr/local install

      - name: 编译 VMAF-CUDA
        run: |
          cd /tmp && git clone --depth 1 https://github.com/Netflix/vmaf.git
          cd vmaf/libvmaf && rm -rf build
          export CUDA_PATH="${CUDA_HOME}" CUDACXX="${CUDA_HOME}/bin/nvcc"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          export C_INCLUDE_PATH="${CUDA_HOME}/include:${C_INCLUDE_PATH:-}"
          meson setup build --buildtype release --prefix="${HOME}/ffmpeg-install" --libdir=lib \
            -Denable_cuda=true -Dc_link_args="-lstdc++" -Dcpp_link_args="-lstdc++"
          ninja -vC build && ninja -C build install

      - name: 编译 FFmpeg
        run: |
          P="${HOME}/ffmpeg-install"
          export PATH="${CUDA_HOME}/bin:${PATH}"
          mkdir -p "$P/lib/pkgconfig"
          printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=/usr/lib/x86_64-linux-gnu\nincludedir=%s\nName: libopenjp2\nDescription: OpenJPEG JPEG 2000 library\nVersion: 2.5.0\nLibs: -L${libdir} -lopenjp2\nCflags: -I${includedir}\n' "$(ls -d /usr/include/openjpeg-* 2>/dev/null | head -1 || echo /usr/include)" > "$P/lib/pkgconfig/libopenjp2.pc"
          # Fallback x265.pc when the distro does not ship it
          printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=/usr/lib/x86_64-linux-gnu\nincludedir=/usr/include\nName: x265\nDescription: H.265/HEVC encoder\nVersion: 1.0.0\nLibs: -L${libdir} -lx265\nLibs.private: -lstdc++ -lm -lgcc -lpthread\nCflags: -I${includedir}\n' > "$P/lib/pkgconfig/x265.pc"
          export PKG_CONFIG_PATH="${P}/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          # 验证 libplacebo 静态链接
          echo "=== manual libplacebo static link test ==="
          printf '%s\n' '#include <libplacebo/vulkan.h>' 'int main(void) { pl_gpu_create(NULL, NULL); return 0; }' > /tmp/pl_test.c
          cc /tmp/pl_test.c $(pkg-config --static --cflags --libs libplacebo) -o /tmp/pl_test 2>&1 && echo "manual link OK" || echo "manual link FAIL"
          cd /tmp && git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="${HOME}/ffmpeg-install" --pkg-config-flags="--static" \
            --extra-cflags="-I${HOME}/ffmpeg-install/include -I${CUDA_HOME}/include" \
            --extra-ldflags="-L${HOME}/ffmpeg-install/lib -L${CUDA_HOME}/lib64 -Wl,-rpath,${HOME}/ffmpeg-install/lib" \
            --extra-libs="-lpthread -lm -ldl -lstdc++" \
            --enable-gpl --enable-version3 --enable-nonfree \
            --enable-libvmaf --enable-ffnvcodec --enable-cuda-nvcc \
            --enable-cuvid --enable-nvenc --enable-opencl --enable-vulkan \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus --enable-libvorbis --enable-libtheora --enable-libaom --enable-libwebp --enable-libass --enable-libfreetype --enable-fontconfig --enable-libzimg --enable-libsoxr --enable-libopenjpeg --enable-libsnappy --enable-libsvtav1 --enable-libdav1d --enable-libkvazaar --enable-libopenh264 --enable-libxvid --enable-libtwolame --enable-libspeex --enable-libcodec2 --enable-libjxl --enable-libopenmpt --enable-libbs2b --enable-libaribb24 --enable-libplacebo --enable-librubberband --enable-libvidstab --enable-libmp3lame --enable-libfdk-aac --enable-sdl2 --disable-doc
          make -j"$(nproc)" && make install

      - name: 裁剪与验证
        run: |
          P="${HOME}/ffmpeg-install"
          export LD_LIBRARY_PATH="${P}/lib:${LD_LIBRARY_PATH:-}"
          strip "${P}/bin/ffmpeg" "${P}/bin/ffprobe" "${P}/bin/ffplay" 2>/dev/null || true
          "${P}/bin/ffmpeg" -version 2>&1 | head -n5
          echo "--- NVENC ---"
          "${P}/bin/ffmpeg" -hide_banner -encoders 2>&1 | grep -E 'av1_nvenc|hevc_nvenc|h264_nvenc' || echo "（无）"
          echo "--- VMAF ---"
          "${P}/bin/ffmpeg" -hide_banner -filters 2>&1 | grep -i vmaf || echo "（无）"

      - name: 打包
        run: |
          mkdir -p dist && cp "${HOME}/ffmpeg-install/bin/"{ffmpeg,ffprobe,ffplay} dist/
          cd dist && tar -cJf ../ffmpeg-linux-nvidia.tar.xz .

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-nvidia
          path: ffmpeg-linux-nvidia.tar.xz
          retention-days: 30

  # ============================================================
  # LINUX — Intel（QSV via oneVPL + VAAPI）
  # ============================================================
  linux-intel-qsv:
    name: Linux（Intel QSV）
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential yasm nasm pkg-config meson ninja-build \
            cmake git wget curl ca-certificates python3 xxd \
            libmp3lame-dev libfdk-aac-dev libsdl2-dev \
            libva-dev libvpl-dev libdrm-dev \
            libx264-dev libx265-dev libvpx-dev libopus-dev libvorbis-dev \
            libtheora-dev libaom-dev libwebp-dev libass-dev libfreetype6-dev \
            libfontconfig1-dev libzimg-dev libsoxr-dev libopenjp2-7-dev \
            libsnappy-dev libvulkan-dev opencl-headers ocl-icd-opencl-dev glslc \
            libsvtav1enc-dev libdav1d-dev libkvazaar-dev libcrypto++-dev libopenh264-dev libxvidcore-dev \
            libtwolame-dev libspeex-dev libcodec2-dev libjxl-dev libopenmpt-dev \
            liblcms2-dev libxxhash-dev libbs2b-dev libaribb24-dev libplacebo-dev glslang-dev spirv-tools librubberband-dev libvidstab-dev
            # 修复 Ubuntu 26.04 中 libkvazaar-dev 的 pkg-config 版本占位符
            kvazaar_ver=$(dpkg-query -W -f='${Version}' libkvazaar-dev 2>/dev/null | sed -E 's/^[0-9]+://; s/^([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/')
            for pc in $(find /usr/lib /usr/local/lib -name kvazaar.pc 2>/dev/null); do
